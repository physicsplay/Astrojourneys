
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>MISSION ATLAS — Mars Landing Window</title>
<style>
*{box-sizing:border-box}
:root{
  --bg0:#050712;
  --bg1:#120916;
  --panel:rgba(8,12,25,.86);
  --panel2:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.12);
  --text:#eef3ff;
  --muted:rgba(220,230,255,.72);
  --gold:#ffd166;
  --cyan:#72ddf7;
  --red:#ff6b6b;
  --green:#7ce38b;
  --orange:#ff9f1c;
  --shadow:0 12px 30px rgba(0,0,0,.35);
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  --ui: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  --r:18px;
}
html,body{height:100%;margin:0;background:
 radial-gradient(1400px 800px at 50% 8%, rgba(255,90,60,.14), transparent 55%),
 radial-gradient(1000px 650px at 70% 30%, rgba(255,190,90,.08), transparent 60%),
 linear-gradient(180deg, #04050d, #100713 56%, #190b12 100%);
color:var(--text);font-family:var(--ui);overflow:hidden}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.app{
  height:100vh;
  display:grid;
  grid-template-columns:1fr 390px;
  grid-template-rows:auto 1fr auto;
}
@media (max-width:1020px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto auto}
}
header{
  grid-column:1/-1;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:10px 12px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(10,12,22,.94), rgba(10,12,22,.72));
  backdrop-filter:blur(8px);
  position:relative; z-index:5;
}
.title{display:flex;align-items:center;gap:10px;font-family:var(--mono);letter-spacing:.05em}
.badge{
  font-size:.72rem;padding:4px 9px;border-radius:999px;
  background:rgba(255,159,28,.12);border:1px solid rgba(255,159,28,.35);color:#ffd7a1
}
.stats{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.stat{
  min-width:88px;padding:7px 10px;border-radius:14px;text-align:center;
  background:rgba(255,255,255,.04);border:1px solid var(--line)
}
.stat .v{font-family:var(--mono);font-size:1.05rem}
.stat .k{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.langs{display:flex;gap:8px}
.lang-btn,.pick{
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);color:var(--text);
  border-radius:12px;padding:7px 10px;
  transition:.15s transform,.15s background,.15s border-color;
}
.lang-btn:hover,.pick:hover,.btn:hover{transform:translateY(-1px)}
.lang-btn.active,.pick.active{background:rgba(114,221,247,.12);border-color:rgba(114,221,247,.45)}
.stage{
  position:relative;overflow:hidden;
  background:
    radial-gradient(900px 520px at 50% 16%, rgba(255,170,90,.09), transparent 55%),
    linear-gradient(180deg, rgba(20,18,38,.55), rgba(30,10,18,.18));
}
canvas{display:block;width:100%;height:100%}
#fxCanvas{position:absolute;inset:0;pointer-events:none}
.side{
  border-left:1px solid var(--line);
  background:linear-gradient(180deg, rgba(10,12,24,.8), rgba(10,12,24,.58));
  overflow:auto;padding:12px;
}
@media (max-width:1020px){
  .side{border-left:none;border-top:1px solid var(--line)}
}
.card{
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:12px;
  margin-bottom:10px;
  box-shadow:var(--shadow);
}
.card h3{
  margin:0 0 10px 0;
  font-size:.85rem;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:rgba(240,244,255,.94);
  font-family:var(--mono);
}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:6px 0;border-top:1px dashed rgba(255,255,255,.08)}
.row:first-of-type{border-top:none}
.row .k{font-size:.82rem;color:var(--muted)}
.row .v{font-family:var(--mono)}
.note,.mini,.statusline{font-size:.83rem;color:rgba(228,235,255,.82);line-height:1.34}
.mini{color:var(--muted)}
.statusline{margin-top:8px}
.good{color:var(--green)!important}
.warn{color:var(--gold)!important}
.bad{color:var(--red)!important}
.slider-wrap{margin-top:10px}
label{display:flex;justify-content:space-between;gap:10px;font-size:.84rem;color:rgba(230,237,255,.86)}
input[type=range]{width:100%;accent-color:#ffb84d}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.btn{
  border:none;border-radius:14px;padding:10px 12px;
  background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text)
}
.btn.primary{background:linear-gradient(135deg, rgba(255,209,102,.98), rgba(255,159,28,.95)); color:#11131a; border-color:rgba(255,209,102,.55); font-weight:700}
.btn.hint{background:rgba(114,221,247,.11);border-color:rgba(114,221,247,.35)}
.btn.danger{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.34)}
.btn.full{grid-column:1/-1}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{
  border-radius:999px;padding:4px 9px;border:1px solid var(--line);
  background:rgba(255,255,255,.04);font-size:.72rem;color:rgba(240,244,255,.86);font-family:var(--mono)
}
.footer{
  grid-column:1/-1;
  border-top:1px solid var(--line);
  background:linear-gradient(180deg, rgba(10,12,22,.78), rgba(10,12,22,.92));
  display:flex;justify-content:space-between;gap:10px;
  padding:8px 12px;font-size:.78rem;color:var(--muted)
}
.overlay{
  position:fixed;inset:0;z-index:20;
  display:grid;place-items:center;
  background:linear-gradient(180deg, rgba(3,4,10,.78), rgba(8,10,20,.92));
  padding:18px;
}
.modal{
  width:min(980px,94vw);
  max-height:92vh;
  overflow:auto;
  border-radius:28px;
  border:1px solid rgba(255,255,255,.12);
  background:
    radial-gradient(850px 500px at 50% 0%, rgba(255,120,60,.11), transparent 60%),
    linear-gradient(180deg, rgba(10,12,24,.96), rgba(11,12,24,.92));
  box-shadow:0 22px 60px rgba(0,0,0,.45);
  padding:18px;
}
.modal h1,.modal h2{margin:0 0 10px 0}
.intro-grid{display:grid;grid-template-columns:1.2fr .9fr;gap:14px}
@media (max-width:860px){.intro-grid{grid-template-columns:1fr}}
.block{
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
}
.hero{
  font-size:1.05rem;line-height:1.5;color:rgba(248,248,255,.96)
}
.dialogue{line-height:1.55;color:rgba(235,239,255,.94)}
.dialogue .who{font-weight:800;color:#ffd7a1}
.em{color:#ffd166}
.par{font-family:var(--mono);color:#72ddf7}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media (max-width:700px){.grid2{grid-template-columns:1fr}}
.formula{
  font-family:var(--mono);
  font-size:.85rem;
  line-height:1.45;
  white-space:pre-line;
  color:rgba(233,240,255,.92)
}
.table{
  width:100%;border-collapse:collapse;font-size:.86rem
}
.table th,.table td{
  padding:9px 8px;border-top:1px dashed rgba(255,255,255,.1);text-align:left;vertical-align:top
}
.table th{color:var(--muted);font-weight:600}
.table tr:first-child th,.table tr:first-child td{border-top:none}
.medal{
  font-size:1.1rem;
  padding:6px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.06);border:1px solid var(--line)
}
textarea{
  width:100%;min-height:82px;border-radius:14px;padding:10px 12px;
  background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--text);resize:vertical
}
.truth-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.truth-btn{
  border:none;border-radius:12px;padding:9px 12px;background:rgba(255,255,255,.06);
  border:1px solid var(--line);color:var(--text)
}
.truth-btn.correct{background:rgba(124,227,139,.12);border-color:rgba(124,227,139,.35)}
.truth-btn.wrong{background:rgba(255,107,107,.14);border-color:rgba(255,107,107,.38)}
.legend{
  display:flex;gap:10px;flex-wrap:wrap;font-size:.78rem;color:var(--muted);margin-top:8px
}
.sw{display:inline-flex;align-items:center;gap:6px}
.sw i{display:inline-block;width:14px;height:4px;border-radius:99px;background:#fff}
.chart-wrap{
  border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.03);padding:10px
}
.smallcaps{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-family:var(--mono)}
kbd{
  font-family:var(--mono);font-size:.78rem;padding:2px 6px;border-radius:6px;
  border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08)
}
/* === PHYSICS QUIZ === */
.quizBox{margin-top:10px;padding:12px;border-radius:14px;border:1px solid rgba(255,209,102,.25);background:rgba(255,209,102,.06)}
.quizBox h4{margin:0 0 8px;font-size:.85rem;color:#ffd166;font-family:var(--mono)}
.quizBox .qText{color:#eef3ff;margin-bottom:8px;line-height:1.4;font-size:.86rem}
.quizBox .qOpts{display:flex;flex-direction:column;gap:5px}
.quizBox .qOpt{padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.04);cursor:pointer;color:#d8e8ff;font-size:.82rem;transition:.12s}
.quizBox .qOpt:hover{border-color:rgba(114,221,247,.35);background:rgba(114,221,247,.07)}
.quizBox .qOpt.correct{border-color:rgba(124,227,139,.5);background:rgba(124,227,139,.1);color:#aaf8c4}
.quizBox .qOpt.wrong{border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.08);color:#ffb3b3}
.quizBox .qExplain{margin-top:8px;padding:8px;border-radius:10px;background:rgba(0,0,0,.2);color:#c4daef;font-size:.82rem;line-height:1.35;display:none}
.quizBox .qExplain.show{display:block}
/* === TOAST === */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);padding:10px 22px;border-radius:999px;background:rgba(10,14,24,.92);border:1px solid rgba(114,221,247,.3);color:#c8e8ff;font-weight:700;font-size:.88rem;z-index:30;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
/* === EXTRA BUTTONS === */
.btn.demo{background:rgba(255,159,28,.11);border-color:rgba(255,159,28,.32);color:#ffd7a1}
.btn.slow{background:rgba(124,227,139,.08);border-color:rgba(124,227,139,.25);color:#b8f5c8}
</style>
</head>
<body>
<div id="introOverlay" class="overlay">
  <div class="modal">
    <div class="intro-grid">
      <div class="block">
        <div class="smallcaps" id="introTag">MISSION ATLAS / GAME 03</div>
        <h1 id="introTitle">MARS LANDING WINDOW</h1>
        <div id="introDialogue" class="dialogue"></div>
        <div class="hero" style="margin-top:12px" id="heroText"></div>
        <div class="grid2" style="margin-top:14px">
          <div class="block">
            <div class="smallcaps" id="learningLabel"></div>
            <div class="hero" id="learningText"></div>
          </div>
          <div class="block">
            <div class="smallcaps" id="bigIdeaLabel"></div>
            <div class="hero" id="bigIdeaText"></div>
          </div>
          <div class="block">
            <div class="smallcaps" id="modelLabel"></div>
            <div class="mini" id="modelText"></div>
          </div>
          <div class="block">
            <div class="smallcaps" id="misLabel"></div>
            <div class="mini" id="misText"></div>
          </div>
        </div>
      </div>

      <div class="block">
        <h2 id="missionBoxTitle">Mission setup</h2>
        <div class="mini" id="missionBoxText"></div>

        <div style="margin-top:14px" class="smallcaps" id="langLabel">Language</div>
        <div class="pills" style="margin-top:8px">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="el">EL</button>
          <button class="lang-btn" data-lang="it">IT</button>
        </div>

        <div style="margin-top:14px" class="smallcaps" id="difficultyLabel">Difficulty</div>
        <div class="pills" style="margin-top:8px">
          <button class="pick diffPick active" data-diff="easy" id="easyBtn"></button>
          <button class="pick diffPick" data-diff="medium" id="mediumBtn"></button>
          <button class="pick diffPick" data-diff="hard" id="hardBtn"></button>
        </div>

        <div class="block" style="margin-top:14px">
          <div class="smallcaps" id="keysLabel"></div>
          <div class="mini" id="keysText"></div>
        </div>

        <div class="btns" style="margin-top:14px">
          <button class="btn primary full" id="startBtn"></button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="pauseOverlay" class="overlay hidden">
  <div class="modal" style="width:min(760px,94vw)">
    <h2 id="pauseTitle"></h2>
    <div class="mini" id="pauseText"></div>
    <div class="grid2" style="margin-top:12px">
      <div class="block">
        <div class="smallcaps" id="computeTitle"></div>
        <div class="formula" id="computePanel"></div>
      </div>
      <div class="block">
        <div class="smallcaps" id="computeReadTitle"></div>
        <div class="mini" id="computeReads"></div>
      </div>
    </div>
    <div class="quizBox hidden" id="pauseQuizBox">
      <h4 id="pauseQuizLabel">🧠 Physics Challenge (+3 pts)</h4>
      <div class="qText" id="pauseQuizQ"></div>
      <div class="qOpts" id="pauseQuizOpts"></div>
      <div class="qExplain" id="pauseQuizExplain"></div>
    </div>
    <div class="btns" style="margin-top:12px">
      <button class="btn" id="resumeBtn"></button>
      <button class="btn hint" id="pauseHintBtn"></button>
    </div>
  </div>
</div>

<div id="endOverlay" class="overlay hidden">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <div>
        <div class="smallcaps" id="endTag"></div>
        <h2 id="endTitle"></h2>
      </div>
      <div class="medal" id="medalBox"></div>
    </div>

    <div class="grid2" style="margin-top:12px">
      <div class="block">
        <div class="smallcaps" id="resultsLabel"></div>
        <table class="table">
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
      <div class="block">
        <div class="smallcaps" id="analysisLabel"></div>
        <table class="table">
          <tbody id="analysisBody"></tbody>
        </table>
      </div>
    </div>

    <div class="block" style="margin-top:12px">
      <div class="smallcaps" id="theoryLabel"></div>
      <div class="mini" id="theoryText"></div>
    </div>

    <div class="chart-wrap" style="margin-top:12px">
      <div class="smallcaps" id="chartLabel"></div>
      <canvas id="chartCanvas" width="840" height="220"></canvas>
      <div class="legend">
        <span class="sw"><i style="background:#72ddf7"></i><span id="chartLeg1"></span></span>
        <span class="sw"><i style="background:#ffd166"></i><span id="chartLeg2"></span></span>
        <span class="sw"><i style="background:#ff6b6b"></i><span id="chartLeg3"></span></span>
      </div>
    </div>

    <div class="block" style="margin-top:12px">
      <div class="smallcaps" id="truthLabel"></div>
      <div class="mini" id="truthQuestion"></div>
      <div class="truth-row">
        <button class="truth-btn" id="truthTrue"></button>
        <button class="truth-btn" id="truthFalse"></button>
      </div>
      <div class="mini" id="truthFeedback" style="margin-top:10px"></div>
    </div>

    <div class="block" style="margin-top:12px">
      <div class="smallcaps" id="reflectionLabel"></div>
      <div class="mini" id="reflectionText"></div>
      <textarea id="reflectionBox"></textarea>
    </div>

    <div class="btns" style="margin-top:12px">
      <button class="btn primary" id="retryBtn"></button>
      <button class="btn" id="newMissionBtn"></button>
    </div>
  </div>
</div>

<div id="app" class="app hidden">
  <header>
    <div class="title">
      <span>🪂 MARS LANDING WINDOW</span>
      <span class="badge" id="badgeText">ATLAS / EDL</span>
    </div>
    <div class="stats">
      <div class="stat"><div class="v" id="attemptsVal">0</div><div class="k" id="attemptsLabel"></div></div>
      <div class="stat"><div class="v" id="hintsVal">0</div><div class="k" id="hintsLabel"></div></div>
      <div class="stat"><div class="v" id="scoreVal">100</div><div class="k" id="scoreLabel"></div></div>
      <div class="langs">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="el">EL</button>
        <button class="lang-btn" data-lang="it">IT</button>
      </div>
    </div>
  </header>

  <div class="stage">
    <canvas id="simCanvas"></canvas>
    <canvas id="fxCanvas"></canvas>
  </div>

  <aside class="side">
    <div class="card">
      <h3 id="missionDataTitle"></h3>
      <div class="row"><div class="k" id="targetLabel"></div><div class="v" id="targetVal"></div></div>
      <div class="row"><div class="k" id="startLabel"></div><div class="v" id="startVal"></div></div>
      <div class="row"><div class="k" id="fuelLabel"></div><div class="v" id="fuelVal"></div></div>
      <div class="row"><div class="k" id="windLabel"></div><div class="v" id="windVal"></div></div>
      <div class="row"><div class="k" id="statusLabel"></div><div class="v" id="statusVal"></div></div>
      <div class="statusline" id="statusLine"></div>
    </div>

    <div class="card">
      <h3 id="liveTitle"></h3>
      <div class="row"><div class="k" id="altLabel"></div><div class="v" id="altVal"></div></div>
      <div class="row"><div class="k" id="vyLabel"></div><div class="v" id="vyVal"></div></div>
      <div class="row"><div class="k" id="vxLabel"></div><div class="v" id="vxVal"></div></div>
      <div class="row"><div class="k" id="rhoLabel"></div><div class="v" id="rhoVal"></div></div>
      <div class="row"><div class="k" id="qLabel"></div><div class="v" id="qVal"></div></div>
      <div class="row"><div class="k" id="throttleLabel"></div><div class="v" id="throttleVal"></div></div>
    </div>

    <div class="card">
      <h3 id="controlsTitle"></h3>
      <div class="slider-wrap">
        <label for="chuteSlider"><span id="chuteLabel"></span><span id="chuteVal"></span></label>
        <input id="chuteSlider" type="range" min="2.5" max="9.0" step="0.1" value="5.7"/>
        <div class="mini" id="chuteHint"></div>
      </div>
      <div class="slider-wrap">
        <label for="burnSlider"><span id="burnLabel"></span><span id="burnVal"></span></label>
        <input id="burnSlider" type="range" min="0.3" max="4.2" step="0.05" value="1.5"/>
        <div class="mini" id="burnHint"></div>
      </div>
      <div class="btns">
        <button class="btn primary" id="runBtn"></button>
        <button class="btn" id="pauseBtn"></button>
        <button class="btn danger" id="resetBtn"></button>
        <button class="btn hint" id="hintBtn"></button>
        <button class="btn demo full" id="chuteOnlyBtn">🪂 Parachute-only demo</button>
        <button class="btn slow full" id="slowBtn">🐌 Slow motion</button>
      </div>
      <div class="note" id="easterEggLine" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <h3 id="physicsTitle"></h3>
      <div class="formula" id="formulaText"></div>
      <div class="mini" id="physicsFoot"></div>
    </div>

    <div class="card">
      <h3 id="computeCardTitle"></h3>
      <div class="mini" id="computeCardText"></div>
      <div class="row"><div class="k" id="predDeployLabel"></div><div class="v" id="predDeployVal"></div></div>
      <div class="row"><div class="k" id="predBurnLabel"></div><div class="v" id="predBurnVal"></div></div>
      <div class="row"><div class="k" id="predStopLabel"></div><div class="v" id="predStopVal"></div></div>
      <div class="row"><div class="k" id="predDriftLabel"></div><div class="v" id="predDriftVal"></div></div>
      <div class="statusline" id="computeStatus"></div>
    </div>

    <div class="card">
      <h3 id="teacherTitle"></h3>
      <div class="mini" id="teacherText"></div>
      <div class="row"><div class="k" id="logCountLabel"></div><div class="v" id="logCountVal">0</div></div>
      <div class="row"><div class="k" id="teacherQLabel"></div><div class="v" id="teacherQVal">—</div></div>
      <div class="row"><div class="k" id="teacherStopLabel"></div><div class="v" id="teacherStopVal">—</div></div>
      <div class="row"><div class="k" id="teacherEnergyLabel"></div><div class="v" id="teacherEnergyVal">—</div></div>
      <div class="btns" style="margin-top:10px">
        <button class="btn" id="exportCsvBtn"></button>
        <button class="btn" id="exportJsonBtn"></button>
        <button class="btn danger full" id="clearLogBtn"></button>
      </div>
      <div class="mini" id="teacherStatus" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <h3 id="logTitle"></h3>
      <div class="mini" id="logText"></div>
      <div class="pills" style="margin-top:10px">
        <span class="pill" id="pill1"></span>
        <span class="pill" id="pill2"></span>
        <span class="pill" id="pill3"></span>

function seededRand(seed){
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function makeMission(){
  const d = DIFFS[state.diff];
  const s = 10 + Math.random()*1000;
  const mission = {
    seed: s,
    diff: state.diff,
    fuel0: d.fuel,
    rho0: d.rho0 * lerp(0.94, 1.08, seededRand(s+1)),
    H: 10200 + 900*seededRand(s+2),
    windBase: d.wind * lerp(0.9, 1.1, seededRand(s+3)),
    windShear: 0.0015 + 0.0006*seededRand(s+4),
    gust: d.gust,
    dustBoost: d.dustBoost,
    dustCtr: d.dustCtr + (-220 + 440*seededRand(s+5)),
    dustWid: d.dustWid,
    startY: d.startY,
    startX: d.startX,
    startVy: d.startVy * lerp(0.97, 1.03, seededRand(s+6)),
    startVx: d.startVx * lerp(0.95, 1.05, seededRand(s+7)),
    ellipse: d.ellipse,
    targetX: 0
  };
  const corridor = findLandingCorridor(mission);
  mission.targetX = corridor.center;
  mission.corridorMin = corridor.min;
  mission.corridorMax = corridor.max;
  mission.ideal = findIdealPlan(mission);
  return mission;
}

function windAt(mission, y, time){
  const base = mission.windBase + mission.windShear * y;
  const w1 = mission.gust * Math.sin(0.065*time + mission.seed*0.7);
  const w2 = mission.gust*0.45 * Math.sin(0.18*time + 1.2 + 0.00085*y + mission.seed*0.31);
  const dust = mission.dustBoost * Math.exp(-Math.pow((y - mission.dustCtr)/mission.dustWid, 2));
  return base + w1 + w2 + base*dust*0.45;
}

function densityAt(mission, y){
  const dust = mission.dustBoost * Math.exp(-Math.pow((y - mission.dustCtr)/mission.dustWid, 2));
  return mission.rho0 * Math.exp(-y/mission.H) * (1 + dust);
}

function simulate(mission, chuteKm, burnKm, fast=false, record=false){
  const v = {
    x: mission.startX,
    y: mission.startY,
    vx: mission.startVx,
    vy: mission.startVy,
    fuel: mission.fuel0,
    dryMass: CONST.dryMass,
    chute: false,
    engine: false,
    t: 0,
    q: 0,
    rho: densityAt(mission, mission.startY),
    deployQ: null,
    qDeploy: null,
    qMax: 0,
    eventDeploy: null,
    eventBurn: null,
    speedAtBurn: null,
    burnMass: null,
    burnY: null,
    driftAtBurn: null,
    hist: []
  };
  const dt = fast ? CONST.fastDt : CONST.simDt;
  let touchdown = false;

  while(v.t < CONST.maxT && v.y > 0){
    if(!v.chute && v.y <= chuteKm*1000){
      v.chute = true;
      v.eventDeploy = v.t;
    }
    if(!v.engine && v.y <= burnKm*1000){
      v.engine = true;
      v.chute = false; // jettison for powered descent
      v.eventBurn = v.t;
      v.speedAtBurn = Math.abs(v.vy);
      v.burnMass = getMass(v);
      v.burnY = v.y;
      v.driftAtBurn = v.x;
    }

    const rho = densityAt(mission, Math.max(v.y,0));
    const wind = windAt(mission, Math.max(v.y,0), v.t);
    const vrx = v.vx - wind;
    const vry = v.vy;
    const vrel = Math.hypot(vrx, vry);
    let area = CONST.bodyArea;
    let cd = CONST.bodyCd;

    if(v.chute){
      const qNow = 0.5 * rho * vrel * vrel;
      if(v.deployQ===null){ v.deployQ = qNow; }
      const inflate = clamp(qNow/220, 0.45, 1);
      area += CONST.chuteArea * inflate;
      cd += CONST.chuteCd;
    }

    const D = 0.5 * rho * cd * area * vrel * vrel;
    const Dx = vrel>1e-6 ? -D * vrx/vrel : 0;
    const Dy = vrel>1e-6 ? -D * vry/vrel : 0;

    let T = 0;
    const m = getMass(v);
    if(v.engine && v.fuel>0){
      const targetVy = (v.y>1800) ? -58 : (v.y>500 ? -20 : (v.y>120 ? -8 : -2.2));
      const desiredAy = (targetVy - v.vy)/1.2;
      const need = m*(desiredAy + CONST.g) - Dy;
      T = clamp(need, 0, CONST.maxThrust);
      const mdot = T / (CONST.Isp * CONST.g0);
      v.fuel = Math.max(0, v.fuel - mdot*dt);
    }

    const ax = Dx / m;
    const ay = -CONST.g + Dy / m + T / m;

    v.vx += ax*dt;
    v.vy += ay*dt;
    v.x += v.vx*dt;
    v.y += v.vy*dt;
    v.t += dt;
    v.q = 0.5 * rho * vrel * vrel;
    v.qMax = Math.max(v.qMax, v.q);
    v.rho = rho;

    if(record && (v.hist.length===0 || v.t - v.hist[v.hist.length-1].t > 0.16)){
      v.hist.push({t:v.t, y:Math.max(0,v.y), vy:v.vy, x:v.x});
    }
  }

  if(v.y <= 0){
    touchdown = true;
    v.y = 0;
  }

  const miss = Math.abs(v.x - mission.targetX);
  const softLanding = touchdown && Math.abs(v.vy) <= CONST.safeVy && v.fuel >= 0;
  return {
    touchdown,
    softLanding,
    x: v.x,
    xMiss: miss,
    vyTouch: v.vy,
    fuelLeft: v.fuel,
    time: v.t,
    qDeploy: v.deployQ ?? 0,
    qMax: v.qMax ?? v.q ?? 0,
    burnSpeed: v.speedAtBurn ?? Math.abs(v.vy),
    burnMass: v.burnMass ?? getMass(v),
    burnY: v.burnY ?? Math.max(v.y, 0),
    burnX: v.driftAtBurn ?? v.x,
    deployT: v.eventDeploy,
    burnT: v.eventBurn,
    hist: v.hist
  };
}

function objective(res, mission){
  let val = 0;
  if(res.touchdown) val += 220;
  val -= Math.max(0, Math.abs(res.vyTouch) - CONST.safeVy) * 34;
  val -= res.xMiss * 0.08;
  val += res.fuelLeft * 0.65;
  val -= Math.abs(res.qDeploy - 170) * 0.05;
  val -= res.time * 0.18;
  if(res.softLanding) val += 180;
  return val;
}


function teacherMetrics(res, mission){
  const mBurn = Math.max(CONST.dryMass, res.burnMass || (CONST.dryMass + res.fuelLeft));
  const aNet = Math.max(0.5, CONST.maxThrust/mBurn - CONST.g);
  const stopDist = (res.burnSpeed*res.burnSpeed) / (2*aNet);
  const energyBudgetJ = 0.5*mBurn*res.burnSpeed*res.burnSpeed + mBurn*CONST.g*Math.max(0, res.burnY || 0);
  return {
    stopDist,
    energyBudgetJ,
    energyBudgetMJ: energyBudgetJ / 1e6,
    aNet,
    qDeploy: res.qDeploy || 0,
    qMax: res.qMax || 0,
    burnY: Math.max(0, res.burnY || 0),
    burnMass: mBurn
  };
}

function downloadBlob(filename, mime, content){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{
    URL.revokeObjectURL(url);
    a.remove();
  }, 50);
}

function findIdealPlan(mission){
  let best = {score:-1e9, chuteKm:5.8, burnKm:1.5, result:null};
  for(let ck=2.8; ck<=8.8; ck+=0.35){
    for(let bk=0.45; bk<=3.8; bk+=0.17){
      const res = simulate(mission, ck, bk, true, false);
      const sc = objective(res, mission);
      if(sc > best.score){
        best = {score:sc, chuteKm:ck, burnKm:bk, result:res};
      }
    }
  }
  return best;
}

function findLandingCorridor(mission){
  const xsSoft = [];
  const xsTouch = [];
  for(let ck=2.8; ck<=8.8; ck+=0.35){
    for(let bk=0.45; bk<=3.8; bk+=0.17){
      const res = simulate(mission, ck, bk, true, false);
      if(res.softLanding) xsSoft.push(res.x);
      if(res.touchdown) xsTouch.push(res.x);
    }
  }
  const pool = xsSoft.length ? xsSoft : (xsTouch.length ? xsTouch : [mission.startX]);
  pool.sort((a,b)=>a-b);
  const center = pool[Math.floor(pool.length/2)];
  return {
    center,
    min: pool[0],
    max: pool[pool.length-1]
  };
}

function updateVehicle(dt){
  const v = state.vehicle;
  const mission = state.mission;
  if(!v || !state.running || state.paused || state.ended) return;

  for(let i=0;i<3;i++){
    if(!v.chute && !v.engine && v.y <= v.chuteArmedKm*1000){
      v.chute = true;
      v.eventDeploy = {x:v.x, y:v.y, t:v.t};
      v.deployQ = v.q;
      $('logText').textContent = t('logDeploy');
    }
    if(!v.engine && v.y <= v.burnArmedKm*1000){
      v.engine = true;
      v.chute = false;
      v.eventBurn = {x:v.x, y:v.y, t:v.t};
      $('logText').textContent = t('logBurn');
    }

    const rho = densityAt(mission, Math.max(v.y,0));
    const wind = windAt(mission, Math.max(v.y,0), v.t);
    const vrx = v.vx - wind;
    const vry = v.vy;
    const vrel = Math.hypot(vrx, vry);
    let area = CONST.bodyArea;
    let cd = CONST.bodyCd;

    if(v.chute){
      const qNow = 0.5*rho*vrel*vrel;
      const inflate = clamp(qNow/220, 0.45, 1);
      area += CONST.chuteArea * inflate;
      cd += CONST.chuteCd;
      v.deployQ = qNow;
    }

    const D = 0.5 * rho * cd * area * vrel * vrel;
    const Dx = vrel>1e-6 ? -D * vrx/vrel : 0;
    const Dy = vrel>1e-6 ? -D * vry/vrel : 0;

    let T = 0;
    const m = getMass(v);
    if(v.engine && v.fuel>0){
      const targetVy = (v.y>1800) ? -58 : (v.y>500 ? -20 : (v.y>120 ? -8 : -2.2));
      const desiredAy = (targetVy - v.vy)/1.2;
      const need = m*(desiredAy + CONST.g) - Dy;
      T = clamp(need, 0, CONST.maxThrust);
      v.throttle = T / CONST.maxThrust;
      const mdot = T / (CONST.Isp * CONST.g0);
      v.fuel = Math.max(0, v.fuel - mdot*dt/3);
    } else {
      v.throttle = 0;
    }

    const ax = Dx / m;
    const ay = -CONST.g + Dy / m + T / m;

    v.vx += ax*(dt/3);
    v.vy += ay*(dt/3);
    v.x += v.vx*(dt/3);
    v.y += v.vy*(dt/3);
    v.t += (dt/3);
    v.rho = rho;
    v.q = 0.5*rho*vrel*vrel;

    if(v.xTrail.length===0 || Math.hypot(v.x - v.xTrail[v.xTrail.length-1].x, v.y - v.xTrail[v.xTrail.length-1].y) > 120){
      v.xTrail.push({x:v.x,y:v.y});
      if(v.xTrail.length>220) v.xTrail.shift();
    }
    if(state.history.length===0 || v.t - state.history[state.history.length-1].t > 0.15){
      state.history.push({t:v.t, y:Math.max(0,v.y), vy:v.vy, x:v.x});
    }

    if(v.y <= 0){
      v.y = 0;
      finishAttempt();
      break;
    }
    if(v.t > CONST.maxT){
      finishAttempt();
      break;
    }
  }
}

function finishAttempt(){
  const chuteKm = parseFloat($('chuteSlider').value);
  const burnKm = parseFloat($('burnSlider').value);
  const res = simulate(state.mission, chuteKm, burnKm, false, true);
  const ideal = state.mission.ideal;
  const success = res.softLanding && res.xMiss <= state.mission.ellipse;
  const stageErr = 0.5*(Math.abs(chuteKm - ideal.chuteKm)/ideal.chuteKm + Math.abs(burnKm - ideal.burnKm)/Math.max(ideal.burnKm,0.5));
  const stageScore = clamp(25*(1 - stageErr), 0, 25);
  const safeScore = success ? 40 : clamp(40*(1 - Math.max(0, Math.abs(res.vyTouch)-CONST.safeVy)/20), 0, 40);
  const fuelScore = clamp(20*(res.fuelLeft/state.mission.fuel0), 0, 20);
  const ellipseScore = clamp(15*(1 - res.xMiss/state.mission.ellipse), 0, 15);
  const metrics = teacherMetrics(res, state.mission);
  const total = Math.round(safeScore + stageScore + fuelScore + ellipseScore);

  state.score = total;
  $('scoreVal').textContent = String(total);

  state.running = false;
  state.paused = false;
  state.ended = true;
  state.lastResult = {
    success, total, res, stageScore, safeScore, fuelScore, ellipseScore,
    chuteKm, burnKm, ideal, stopDist: metrics.stopDist, energyBudgetMJ: metrics.energyBudgetMJ
  };
  logAttempt(state.lastResult);
  updateMissionUI();
  populateEnd();
  $('endOverlay').classList.remove('hidden');
}

function buildNarrative(final){
  if(!final) return t('stateReady');
  const parts = [];
  const dx = final.res.x - state.mission.targetX;
  if(final.chuteKm > final.ideal.chuteKm + 0.45) parts.push(t('diagChuteHigh'));
  if(final.chuteKm < final.ideal.chuteKm - 0.45) parts.push(t('diagChuteLow'));
  if(final.burnKm < final.ideal.burnKm - 0.3) parts.push(t('diagBurnLate'));
  if(final.burnKm > final.ideal.burnKm + 0.55) parts.push(t('diagBurnEarly'));
  if(dx < -state.mission.ellipse) parts.push(t('diagLeft'));
  if(dx > state.mission.ellipse) parts.push(t('diagRight'));
  if(parts.length===0){
    return final.success ? t('stateSuccess') : t('stateFail');
  }
  return parts[0];
}

function populateEnd(){
  const f = state.lastResult;
  if(!f) return;
  $('endTitle').textContent = f.success ? t('endTitleSuccess') : t('endTitleFail');

  let medal = t('medalHeart');
  if(f.total >= 90) medal = t('medalGold');
  else if(f.total >= 75) medal = t('medalSilver');
  else if(f.total >= 60) medal = t('medalBronze');
  $('medalBox').textContent = medal;

  const rbody = $('resultsBody');
  const abody = $('analysisBody');
  rbody.innerHTML = '';
  abody.innerHTML = '';

  const add = (tbody, k, v, cls='')=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<th>${k}</th><td class="${cls}">${v}</td>`;
    tbody.appendChild(tr);
  };

  add(rbody, t('resultsScore'), `${f.total}/100`, f.total>=75?'good':f.total>=60?'warn':'bad');
  add(rbody, t('resultsFuel'), `${f.res.fuelLeft.toFixed(1)} kg`, f.res.fuelLeft>0?'good':'bad');
  add(rbody, t('resultsTouch'), `${Math.abs(f.res.vyTouch).toFixed(2)} m/s`, Math.abs(f.res.vyTouch)<=CONST.safeVy?'good':'bad');
  add(rbody, t('resultsMiss'), `${f.res.xMiss.toFixed(0)} m`, f.res.xMiss<=state.mission.ellipse?'good':'bad');
  add(rbody, t('resultsTime'), `${f.res.time.toFixed(1)} s`);

  add(abody, t('analysisStage'), `${f.chuteKm.toFixed(2)} km / ${f.burnKm.toFixed(2)} km → ${f.stageScore.toFixed(1)}/25`, f.stageScore>18?'good':f.stageScore>10?'warn':'bad');
  add(abody, t('analysisSpeed'), buildNarrative(f), (Math.abs(f.res.vyTouch)<=CONST.safeVy)?'good':'bad');
  const dxTouch = f.res.x - state.mission.targetX;
  add(abody, t('analysisEllipse'), `${dxTouch>=0?'+':''}${dxTouch.toFixed(0)} m`, f.res.xMiss<=state.mission.ellipse?'good':'bad');
  add(abody, t('analysisQ'), `${f.res.qDeploy.toFixed(0)} Pa (max ${f.res.qMax.toFixed(0)} Pa)`, (f.res.qDeploy>=90 && f.res.qDeploy<=260)?'good':'warn');
  add(abody, t('analysisStop'), `${Math.round(f.stopDist)} m needed vs ${Math.round(f.res.burnY)} m available`, f.stopDist<=f.res.burnY?'good':'bad');
  add(abody, t('analysisEnergy'), energyExplain(f.energyBudgetMJ.toFixed(2)), f.energyBudgetMJ<22?'good':'warn');
  add(abody, t('analysisMyth'), t('mythLine'));

  drawChart(f.res.hist);
}

function drawChart(hist){
  const c = $('chartCanvas');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(0,0,W,H);

  if(!hist || hist.length<2) return;

  const pad = 32;
  const maxT = hist[hist.length-1].t;
  const maxY = Math.max(...hist.map(d=>d.y), 100);
  const maxV = Math.max(...hist.map(d=>Math.abs(d.vy)), 10);

  const xOf = t=> pad + (W-2*pad)*(t/maxT);
  const yOfAlt = y=> H-pad - (H-2*pad)*(y/maxY);
  const yOfV = v=> H-pad - (H-2*pad)*(Math.abs(v)/maxV);

  ctx.strokeStyle = 'rgba(255,255,255,0.14)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad,pad); ctx.lineTo(pad,H-pad); ctx.lineTo(W-pad,H-pad);
  ctx.stroke();

  ctx.fillStyle = 'rgba(220,230,255,.7)';
  ctx.font = '12px ui-monospace, monospace';
  ctx.fillText('t', W-pad+6, H-pad+4);
  ctx.fillText('y', pad-14, pad-6);

  ctx.strokeStyle = '#72ddf7';
  ctx.lineWidth = 2;
  ctx.beginPath();
  hist.forEach((d,i)=>{
    const x = xOf(d.t), y = yOfAlt(d.y);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();

  ctx.strokeStyle = '#ffd166';
  ctx.lineWidth = 2;
  ctx.beginPath();
  hist.forEach((d,i)=>{
    const x = xOf(d.t), y = yOfV(d.vy);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();

  const f = state.lastResult;
  if(f){
    const marks = [f.res.deployT, f.res.burnT].filter(v=>v!=null);
    ctx.strokeStyle = '#ff6b6b';
    ctx.setLineDash([5,5]);
    marks.forEach(m=>{
      const x = xOf(m);
      ctx.beginPath();
      ctx.moveTo(x,pad); ctx.lineTo(x,H-pad);
      ctx.stroke();
    });
    ctx.setLineDash([]);
  }
}

function resizeCanvases(){
  const sim = $('simCanvas');
  const fx = $('fxCanvas');
  const stage = sim.parentElement.getBoundingClientRect();
  sim.width = Math.max(400, Math.floor(stage.width*devicePixelRatio));
  sim.height = Math.max(300, Math.floor(stage.height*devicePixelRatio));
  fx.width = sim.width;
  fx.height = sim.height;
  initStars();
  draw();
}

function initStars(){
  const c = $('simCanvas');
  state.stars = [];
  for(let i=0;i<120;i++){
    state.stars.push({
      x: Math.random()*c.width,
      y: Math.random()*c.height*0.62,
      r: Math.random()*1.8+0.3,
      a: Math.random()*0.55+0.15
    });
  }
}

function worldToScreen(x,y,view){
  const c = $('simCanvas');
  const left = view.left;
  const right = view.right;
  const sx = (x-left)/(right-left) * c.width;
  const sy = c.height - (y/view.top)*c.height;
  return {x:sx, y:sy};
}

function drawBackground(ctx, W, H){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#08111f');
  g.addColorStop(0.4,'#40203a');
  g.addColorStop(0.72,'#6b2c23');
  g.addColorStop(1,'#2c0d0a');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  state.stars.forEach(s=>{
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  const sun = ctx.createRadialGradient(W*0.72,H*0.18,10, W*0.72,H*0.18,140);
  sun.addColorStop(0,'rgba(255,245,210,.9)');
  sun.addColorStop(.2,'rgba(255,190,120,.35)');
  sun.addColorStop(1,'rgba(255,120,60,0)');
  ctx.fillStyle = sun;
  ctx.beginPath(); ctx.arc(W*0.72,H*0.18,140,0,Math.PI*2); ctx.fill();
}

function draw(){
  const c = $('simCanvas');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);
  drawBackground(ctx, W, H);

  const v = state.vehicle;
  const top = Math.max(1700, (v ? v.y + 2300 : state.mission ? state.mission.startY+1500 : 13000));
  const xRefs = [];
  if(state.mission){
    xRefs.push(state.mission.startX, state.mission.targetX ?? 0);
    if(Number.isFinite(state.mission.corridorMin)) xRefs.push(state.mission.corridorMin);
    if(Number.isFinite(state.mission.corridorMax)) xRefs.push(state.mission.corridorMax);
  }
  if(v) xRefs.push(v.x);
  const left = (xRefs.length ? Math.min(...xRefs) : -1800) - 900;
  const right = (xRefs.length ? Math.max(...xRefs) : 1800) + 900;
  const view = {top, left, right};

  // atmosphere haze
  const haze = ctx.createLinearGradient(0,H*0.4,0,H);
  haze.addColorStop(0,'rgba(255,150,80,.02)');
  haze.addColorStop(1,'rgba(255,140,80,.24)');
  ctx.fillStyle = haze;
  ctx.fillRect(0,0,W,H);

  // ground
  const groundY = worldToScreen(0,0,view).y;
  ctx.fillStyle = '#3c1a14';
  ctx.fillRect(0, groundY, W, H-groundY);
  ctx.strokeStyle = 'rgba(255,195,130,.28)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY+0.5);
  ctx.lineTo(W, groundY+0.5);
  ctx.stroke();

  // dunes
  ctx.fillStyle = 'rgba(255,160,100,.09)';
  for(let i=0;i<7;i++){
    ctx.beginPath();
    ctx.ellipse((i/6)*W, groundY+10, 110+20*i, 26+5*(i%3), 0, 0, Math.PI*2);
    ctx.fill();
  }

  // target ellipse + habitat
  if(state.mission){
    const left = worldToScreen(state.mission.targetX - state.mission.ellipse, 0, view);
    const right = worldToScreen(state.mission.targetX + state.mission.ellipse, 0, view);
    ctx.fillStyle = 'rgba(114,221,247,.12)';
    ctx.strokeStyle = 'rgba(114,221,247,.75)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse((left.x+right.x)/2, groundY-10, Math.abs(right.x-left.x)/2, 10, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();

    const h = worldToScreen(state.mission.targetX, 0, view);
    ctx.fillStyle = '#b9d8ff';
    ctx.fillRect(h.x-18, groundY-26, 36, 12);
    ctx.fillStyle = '#90b2dd';
    ctx.fillRect(h.x-11, groundY-36, 22, 10);
    ctx.strokeStyle = 'rgba(255,255,255,.65)';
    ctx.beginPath(); ctx.moveTo(h.x+20, groundY-26); ctx.lineTo(h.x+34, groundY-50); ctx.stroke();
    ctx.beginPath(); ctx.arc(h.x+36, groundY-54, 7, 0, Math.PI*2); ctx.stroke();
  }

  // flight trail
  if(v && v.xTrail.length>1){
    ctx.strokeStyle = 'rgba(255,255,255,.32)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    v.xTrail.forEach((p,i)=>{
      const s = worldToScreen(p.x,p.y,view);
      if(i===0) ctx.moveTo(s.x,s.y); else ctx.lineTo(s.x,s.y);
    });
    ctx.stroke();
  }

  if(v){
    // wind arrows near craft
    const wind = windAt(state.mission, v.y, v.t);
    const craft = worldToScreen(v.x, v.y, view);
    ctx.strokeStyle = 'rgba(114,221,247,.55)';
    ctx.lineWidth = 2;
    for(let i=0;i<3;i++){
      const y = craft.y - 48 + i*16;
      ctx.beginPath();
      ctx.moveTo(craft.x - 44, y);
      ctx.lineTo(craft.x - 44 + Math.sign(wind)*18, y);
      ctx.lineTo(craft.x - 44 + Math.sign(wind)*12, y-4);
      ctx.moveTo(craft.x - 44 + Math.sign(wind)*18, y);
      ctx.lineTo(craft.x - 44 + Math.sign(wind)*12, y+4);
      ctx.stroke();
    }

    // craft body
    ctx.save();
    ctx.translate(craft.x, craft.y);
    ctx.fillStyle = '#f2f5ff';
    ctx.strokeStyle = '#3e4860';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0,-12); ctx.lineTo(10,10); ctx.lineTo(-10,10); ctx.closePath();
    ctx.fill(); ctx.stroke();

    if(v.chute){
      ctx.strokeStyle = '#ffd166';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-8,-10); ctx.lineTo(-18,-32);
      ctx.moveTo(0,-10); ctx.lineTo(0,-36);
      ctx.moveTo(8,-10); ctx.lineTo(18,-32);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,209,102,.9)';
      ctx.beginPath();
      ctx.moveTo(-24,-32); ctx.quadraticCurveTo(0,-56,24,-32); ctx.closePath();
      ctx.fill();
    }

    if(v.engine && v.fuel>0 && v.throttle>0.02){
      ctx.fillStyle = 'rgba(255,170,60,.9)';
      ctx.beginPath();
      ctx.moveTo(-6,10);
      ctx.lineTo(0, 10 + 12 + 20*v.throttle);
      ctx.lineTo(6,10);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,245,190,.9)';
      ctx.beginPath();
      ctx.moveTo(-3,10);
      ctx.lineTo(0, 10 + 8 + 10*v.throttle);
      ctx.lineTo(3,10);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    if(v.eventDeploy){
      const p = worldToScreen(v.eventDeploy.x, v.eventDeploy.y, view);
      ctx.fillStyle = '#ffd166';
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
    }
    if(v.eventBurn){
      const p = worldToScreen(v.eventBurn.x, v.eventBurn.y, view);
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
    }
  }

  // overlay mini labels
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.font = `${14*devicePixelRatio}px ui-monospace, monospace`;
  ctx.fillText(`Mars g = 3.71 m/s²`, 16*devicePixelRatio, 24*devicePixelRatio);

  updateLiveTelemetry();
}

function loop(){
  cancelAnimationFrame(state.raf);
  const tick = ()=>{
    updateVehicle(CONST.simDt);
    updateMissionUI();
    draw();
    state.raf = requestAnimationFrame(tick);
  };
  tick();
}

function handleTruth(choice){
  if(state.truthDone) return;
  state.truthDone = true;
  const correct = (choice===false);
  $('truthFeedback').textContent = correct ? t('truthCorrect') : t('truthWrong');
  $('truthTrue').classList.add(choice===true ? (correct?'correct':'wrong') : '');
  $('truthFalse').classList.add(choice===false ? 'correct' : '');
}

function setupEvents(){
  $$('.lang-btn').forEach(btn=>btn.addEventListener('click', ()=>setLanguage(btn.dataset.lang)));
  $$('.diffPick').forEach(btn=>btn.addEventListener('click', ()=>setDifficulty(btn.dataset.diff)));

  $('startBtn').addEventListener('click', startMission);
  $('runBtn').addEventListener('click', ()=>{ if(!state.running && !state.ended){ beginAttempt(); } });
  $('pauseBtn').addEventListener('click', ()=>togglePause());
  $('resetBtn').addEventListener('click', resetAttempt);
  $('hintBtn').addEventListener('click', useHint);
  $('pauseHintBtn').addEventListener('click', useHint);
  $('exportCsvBtn').addEventListener('click', exportAttemptCsv);
  $('exportJsonBtn').addEventListener('click', exportAttemptJson);
  $('clearLogBtn').addEventListener('click', clearAttemptLog);
  $('resumeBtn').addEventListener('click', ()=>togglePause(false));
  $('retryBtn').addEventListener('click', ()=>{ $('endOverlay').classList.add('hidden'); resetAttempt(); });
  $('newMissionBtn').addEventListener('click', ()=>{ startMission(); });

  $('chuteSlider').addEventListener('input', ()=>{ updateMissionUI(); schedulePreview(); });
  $('burnSlider').addEventListener('input', ()=>{ updateMissionUI(); schedulePreview(); });

  $('truthTrue').addEventListener('click', ()=>handleTruth(true));
  $('truthFalse').addEventListener('click', ()=>handleTruth(false));

  window.addEventListener('resize', resizeCanvases);

  document.addEventListener('keydown', (e)=>{
    if(!$('introOverlay').classList.contains('hidden')){
      if(e.code==='Enter' || e.code==='Space'){ e.preventDefault(); startMission(); }
      return;
    }
    switch(e.code){
      case 'Space':
      case 'Enter':
        if(!state.running && !state.ended){ e.preventDefault(); beginAttempt(); }
        break;
      case 'KeyP':
        togglePause();
        break;
      case 'KeyR':
        resetAttempt();
        break;
      case 'KeyH':
        useHint();
        break;
      case 'Escape':
        if(state.paused) togglePause(false);
        break;
    }
  });
}

  {q:'The drag formula is D = ½ρCdAv². If you double the speed, drag force becomes:',
   opts:['2× larger','4× larger','8× larger','Same'], correct:1,

  {q:'Why does a parachute alone fail on Mars even though gravity is lower?',

    quizState.bonus += 3;

}

/* ===== CANVAS: FBD FORCE ARROWS ===== */
function drawForceArrows(ctx, v, view, W, H){
  if(!v || !state.running || state.paused || state.ended) return;

  const craft = worldToScreen(v.x, v.y, view);
  const m = getMass(v);
  const rho = v.rho;
  const wind = windAt(state.mission, Math.max(v.y,0), v.t);
  const vrx = v.vx - wind;
  const vry = v.vy;
  const vrel = Math.hypot(vrx, vry);
  let area = CONST.bodyArea, cd = CONST.bodyCd;
  if(v.chute){ area += CONST.chuteArea * 0.8; cd += CONST.chuteCd; }
  const D = 0.5 * rho * cd * area * vrel * vrel;
  const T = v.engine && v.fuel > 0 ? v.throttle * CONST.maxThrust : 0;
  const mg = m * CONST.g;

  // Scale factor for arrows (pixels per Newton)
  const scale = Math.min(0.008, 60 / Math.max(mg, 1));
  const cx = craft.x, cy = craft.y;

  // Weight arrow (down) — red
  const mgLen = mg * scale;
  ctx.strokeStyle = '#ff6b6b';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx, cy+14); ctx.lineTo(cx, cy+14+mgLen); ctx.stroke();
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath(); ctx.moveTo(cx-4, cy+14+mgLen); ctx.lineTo(cx+4, cy+14+mgLen); ctx.lineTo(cx, cy+18+mgLen); ctx.fill();
  ctx.font = `${11*devicePixelRatio}px ui-monospace`;
  ctx.fillText(`mg=${Math.round(mg)}N`, cx+8, cy+20+mgLen/2);

  // Drag arrow (up if descending) — cyan
  if(D > 10){
    const dLen = D * scale;
    ctx.strokeStyle = '#72ddf7';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx-6, cy-14); ctx.lineTo(cx-6, cy-14-dLen); ctx.stroke();
    ctx.fillStyle = '#72ddf7';
    ctx.beginPath(); ctx.moveTo(cx-10, cy-14-dLen); ctx.lineTo(cx-2, cy-14-dLen); ctx.lineTo(cx-6, cy-18-dLen); ctx.fill();
    ctx.fillText(`D=${Math.round(D)}N`, cx-50, cy-14-dLen/2);
  }

  // Thrust arrow (up) — orange
  if(T > 100){
    const tLen = T * scale;
    ctx.strokeStyle = '#ff9f1c';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx+6, cy-14); ctx.lineTo(cx+6, cy-14-tLen); ctx.stroke();
    ctx.fillStyle = '#ff9f1c';
    ctx.beginPath(); ctx.moveTo(cx+2, cy-14-tLen); ctx.lineTo(cx+10, cy-14-tLen); ctx.lineTo(cx+6, cy-18-tLen); ctx.fill();
    ctx.fillText(`T=${Math.round(T)}N`, cx+14, cy-14-tLen/2);
  }
}

/* ===== CANVAS: ALTITUDE ANNOTATIONS + ZONES ===== */
function drawAnnotations(ctx, view, W, H){
  if(!state.mission) return;
  const chuteKm = parseFloat($('chuteSlider').value);
  const burnKm = parseFloat($('burnSlider').value);

  // Altitude markers
  const altitudes = [1000, 2000, 3000, 5000, 8000, 10000];
  ctx.font = `${10*devicePixelRatio}px ui-monospace`;
  altitudes.forEach(h => {
    const p = worldToScreen(view.left + 50, h, view);
    if(p.y > 20 && p.y < H - 30){
      ctx.strokeStyle = 'rgba(255,255,255,.08)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,8]);
      ctx.beginPath(); ctx.moveTo(0, p.y); ctx.lineTo(W, p.y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,255,255,.3)';
      ctx.fillText(`${(h/1000).toFixed(0)} km`, 6*devicePixelRatio, p.y - 3);
    }
  });

  // Chute deploy zone band
  const chuteY = worldToScreen(0, chuteKm * 1000, view).y;
  ctx.fillStyle = 'rgba(255,209,102,.06)';
  ctx.fillRect(0, chuteY - 20, W, 40);
  ctx.strokeStyle = 'rgba(255,209,102,.4)';
  ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(0, chuteY); ctx.lineTo(W, chuteY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,209,102,.65)';
  ctx.fillText(`🪂 ${chuteKm.toFixed(1)} km`, W - 120*devicePixelRatio, chuteY - 5);

  // Burn ignition zone band
  const burnY = worldToScreen(0, burnKm * 1000, view).y;
  ctx.fillStyle = 'rgba(255,107,107,.06)';
  ctx.fillRect(0, burnY - 20, W, 40);
  ctx.strokeStyle = 'rgba(255,107,107,.4)';
  ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(0, burnY); ctx.lineTo(W, burnY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,107,107,.65)';
  ctx.fillText(`🔥 ${burnKm.toFixed(1)} km`, W - 120*devicePixelRatio, burnY - 5);

  // Chute-only ghost trail
  if(chuteOnlyResult && chuteOnlyResult.hist && chuteOnlyResult.hist.length > 1){
    ctx.strokeStyle = 'rgba(255,107,107,.25)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4,6]);
    ctx.beginPath();
    chuteOnlyResult.hist.forEach((d,i) => {
      const p = worldToScreen(d.x, d.y, view);
      if(i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    });
    ctx.stroke();
    ctx.setLineDash([]);
    // Label
    const last = chuteOnlyResult.hist[chuteOnlyResult.hist.length-1];
    const lp = worldToScreen(last.x, Math.max(last.y, 50), view);
    ctx.fillStyle = 'rgba(255,107,107,.6)';
    ctx.fillText('💥 chute-only', lp.x+8, lp.y-4);
  }
}

/* ===== CANVAS: ENERGY GAUGE ===== */
function drawEnergyGauge(ctx, v, W, H){
  if(!v) return;
  const m = getMass(v);
  const Ek = 0.5 * m * (v.vx*v.vx + v.vy*v.vy);
  const Ep = m * CONST.g * Math.max(0, v.y);
  const Etotal = Ek + Ep;
  const maxE = 0.5 * m * (500*500) + m * CONST.g * 13000; // approximate initial

  const bx = 14*devicePixelRatio, by = H - 70*devicePixelRatio;
  const bw = 180*devicePixelRatio, bh = 52*devicePixelRatio;

  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.strokeStyle = 'rgba(255,255,255,.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.beginPath();ctx.moveTo(bx+8,by);ctx.lineTo(bx+bw-8,by);ctx.arcTo(bx+bw,by,bx+bw,by+8,8);ctx.lineTo(bx+bw,by+bh-8);ctx.arcTo(bx+bw,by+bh,bx+bw-8,by+bh,8);ctx.lineTo(bx+8,by+bh);ctx.arcTo(bx,by+bh,bx,by+bh-8,8);ctx.lineTo(bx,by+8);ctx.arcTo(bx,by,bx+8,by,8);ctx.closePath();
  ctx.fill(); ctx.stroke();

  ctx.font = `${9*devicePixelRatio}px ui-monospace`;
  ctx.fillStyle = 'rgba(255,255,255,.6)';
  ctx.fillText('Energy to remove', bx+6, by+12*devicePixelRatio);

  // Ek bar
  const barY = by + 18*devicePixelRatio;
  const barH = 8*devicePixelRatio;
  const barW = bw - 12;
  const ekFrac = clamp(Ek / Math.max(maxE, 1), 0, 1);
  const epFrac = clamp(Ep / Math.max(maxE, 1), 0, 1);

  ctx.fillStyle = 'rgba(255,255,255,.08)';
  ctx.fillRect(bx+6, barY, barW, barH);
  ctx.fillStyle = 'rgba(255,159,28,.7)';
  ctx.fillRect(bx+6, barY, barW * ekFrac, barH);
  ctx.fillStyle = 'rgba(114,221,247,.5)';
  ctx.fillRect(bx+6 + barW*ekFrac, barY, barW * epFrac, barH);

  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.font = `${8*devicePixelRatio}px ui-monospace`;
  ctx.fillText(`K=${(Ek/1e6).toFixed(1)}MJ  U=${(Ep/1e6).toFixed(1)}MJ  Σ=${(Etotal/1e6).toFixed(1)}MJ`, bx+6, barY + barH + 10*devicePixelRatio);
}

/* ===== HOOK INTO EXISTING FUNCTIONS ===== */

// Override togglePause to show quiz
const _origTogglePause = togglePause;
togglePause = function(force){
  _origTogglePause(force);
  if(state.paused) showPauseQuiz();
  else hidePauseQuiz();
};

// Override updateVehicle for slow motion
const _origSimDt = CONST.simDt;

// Override draw to add new canvas elements
const _origDraw = draw;
draw = function(){
  _origDraw();
  const c = $('simCanvas');
  const ctx2 = c.getContext('2d');
  const W = c.width, H = c.height;
  const v = state.vehicle;
  const top = Math.max(1700, (v ? v.y + 2300 : state.mission ? state.mission.startY+1500 : 13000));
  const xRefs = [];
  if(state.mission){
    xRefs.push(state.mission.startX, state.mission.targetX ?? 0);
    if(Number.isFinite(state.mission.corridorMin)) xRefs.push(state.mission.corridorMin);
    if(Number.isFinite(state.mission.corridorMax)) xRefs.push(state.mission.corridorMax);
  }
  if(v) xRefs.push(v.x);
  const left = (xRefs.length ? Math.min(...xRefs) : -1800) - 900;
  const right = (xRefs.length ? Math.max(...xRefs) : 1800) + 900;
  const view = {top, left, right};

  drawAnnotations(ctx2, view, W, H);
  drawForceArrows(ctx2, v, view, W, H);
  drawEnergyGauge(ctx2, v, W, H);
};

// Wire new buttons
$('chuteOnlyBtn').addEventListener('click', runChuteOnlyDemo);
$('slowBtn').addEventListener('click', toggleSlow);

// Modify the loop to respect slow motion
const _origLoop = loop;
loop = function(){
  cancelAnimationFrame(state.raf);
  const tick = ()=>{
    const dt = slowMode ? CONST.simDt * 0.25 : CONST.simDt;
    updateVehicle(dt);
    updateMissionUI();
    draw();
    state.raf = requestAnimationFrame(tick);
  };
  tick();
};

window.addEventListener('load', init);
</script>
