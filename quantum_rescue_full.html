function resizeCanvas(){
  const canvas = q("simCanvas");
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(320, Math.floor(rect.width * dpr));
  canvas.height = Math.max(280, Math.floor(rect.height * dpr));
  makeStarfield();
  render();
}

function loop(ts){
  if(state.started && !state.paused){
    if(state.lastTs){
      state.timeSec += (ts - state.lastTs) / 1000;
    }
    state.lastTs = ts;
    state.fx.scanPhase += (ts % 17) * 0.00007;
    state.fx.flash *= 0.94;
    state.fx.stagePulse *= 0.965;
    if(state.fx.action) state.fx.action.timer *= 0.93;
    if(state.stage2Viz) state.stage2Viz.pulse *= 0.93;
  } else {
    // Keep time advancing during celebration so fireworks animate
    if(state.fx.celebration && state.fx.celebration.active && state.lastTs){
      state.timeSec += (ts - state.lastTs) / 1000;
    }
    state.lastTs = ts;
    state.fx.flash *= 0.92;
    state.fx.stagePulse *= 0.96;
    if(state.fx.action) state.fx.action.timer *= 0.9;
    if(state.stage2Viz) state.stage2Viz.pulse *= 0.9;
  }
  render();
  requestAnimationFrame(loop);
}

function render(){
  const canvas = q("simCanvas");
  const ctx = canvas.getContext("2d");
  if(!ctx) return;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  drawBackground(ctx,w,h);
  if(!state.started){
    return;
  }
  if(state.stage === 1) drawStage1(ctx,w,h);
  else if(state.stage === 2) drawStage2(ctx,w,h);
  else if(state.stage === 3) drawStage3(ctx,w,h);
  else drawStage4(ctx,w,h);

  drawArcadeAction(ctx,w,h);

  // ========== VICTORY FIREWORKS ==========
  if(state.fx.celebration && state.fx.celebration.active){
    const cel = state.fx.celebration;
    const elapsed = state.timeSec - cel.startTime;
    const dprC = window.devicePixelRatio || 1;
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    cel.particles.forEach(p => {
      if(elapsed < p.delay) return;
      const t = elapsed - p.delay;
      p.x += p.vx * 1.5;
      p.y += p.vy * 1.5 + t * 0.3; // gravity
      p.life -= p.decay;
      if(p.life <= 0) return;
      ctx.fillStyle = p.color + p.life + ")";
      ctx.shadowColor = p.color + "0.6)";
      ctx.shadowBlur = 8 * dprC;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * dprC * p.life, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.shadowBlur = 0;

    // Pod launch trail (center of canvas, ascending)
    const podY = h * 0.7 - elapsed * h * 0.15;
    if(podY > -50){
      const podX = w * 0.5;
      // Exhaust trail
      for(let i=0;i<12;i++){
        const ty = podY + 20*dprC + i*8*dprC;
        const spread = i*3*dprC;
        ctx.fillStyle = `rgba(255,${180-i*12},${60+i*8},${0.6-i*0.045})`;
        ctx.beginPath();
        ctx.arc(podX + (Math.random()-0.5)*spread, ty, (4-i*0.3)*dprC, 0, Math.PI*2);
        ctx.fill();
      }
      // Pod glow
      const podGlow = ctx.createRadialGradient(podX,podY,0,podX,podY,30*dprC);
      podGlow.addColorStop(0,"rgba(255,255,255,.9)");
      podGlow.addColorStop(0.4,"rgba(119,214,255,.5)");
      podGlow.addColorStop(1,"rgba(119,214,255,0)");
      ctx.fillStyle = podGlow;
      ctx.beginPath(); ctx.arc(podX,podY,30*dprC,0,Math.PI*2); ctx.fill();
      // Pod body
      ctx.fillStyle = "#eef6ff";
      ctx.beginPath();
      ctx.moveTo(podX, podY-14*dprC);
      ctx.lineTo(podX-8*dprC, podY+10*dprC);
      ctx.lineTo(podX+8*dprC, podY+10*dprC);
      ctx.closePath();
      ctx.fill();
    }

    // "MISSION COMPLETE" flash text
    if(elapsed > 1.5){
      const flashAlpha = Math.min(1, (elapsed-1.5)*2);
      ctx.fillStyle = `rgba(255,209,102,${flashAlpha})`;
      ctx.font = `900 ${28*dprC}px sans-serif`;
      ctx.textAlign = "center";
      ctx.shadowColor = "rgba(255,209,102,.5)";
      ctx.shadowBlur = 20*dprC;
      ctx.fillText(tr("missionDone"), w/2, h*0.35);
      ctx.shadowBlur = 0;
      ctx.textAlign = "left";
    }
    ctx.globalCompositeOperation = "source-over";
    ctx.restore();
  }

  if(state.fx.flash > 0.01){
    ctx.save();
    ctx.fillStyle = `rgba(114,241,184,${0.18*state.fx.flash})`;
    ctx.fillRect(0,0,w,h);
    ctx.restore();
  }

  if(state.combo.current >= 2){
    const dpr = window.devicePixelRatio || 1;
    ctx.save();
    ctx.fillStyle = "rgba(255,139,216,.12)";
    ctx.strokeStyle = "rgba(255,139,216,.32)";
    const tagW = 120*dpr, tagH = 34*dpr;
    ctx.beginPath();
    ctx.roundRect(w - tagW - 18*dpr, 18*dpr, tagW, tagH, 16*dpr);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#ffe7f9";
    ctx.font = `900 ${16*dpr}px sans-serif`;
    ctx.fillText("COMBO x" + state.combo.current, w - tagW + 4*dpr, 41*dpr);
    ctx.restore();
  }

  if(state.paused && !state.briefing.active && !(state.fx.celebration && state.fx.celebration.active)){
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,.38)";
    ctx.fillRect(0,0,w,h);
    const dpr = window.devicePixelRatio || 1;
    ctx.fillStyle = "#eef6ff";
    ctx.font = `${18 * dpr}px sans-serif`;
    ctx.fillText(tr("pausedOverlay"), 20 * dpr, 30 * dpr);
    ctx.restore();
  }
}

function drawBackground(ctx,w,h){
  const dpr = window.devicePixelRatio || 1;
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,"#08111f");
  grad.addColorStop(.55,"#09172a");
  grad.addColorStop(1,"#050c16");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);

  state.nebula.forEach(n => {
    const g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0, `rgba(${n.color},${0.12 + 0.04*Math.sin(state.timeSec*0.5+n.seed)})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fill();
  });

  state.stars.forEach((s,i)=>{
    const tw = 0.45 + 0.55 * Math.sin(state.timeSec * s.speed + s.phase);
    ctx.fillStyle = `rgba(255,255,255,${s.a * tw})`;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r + 0.25*Math.sin(state.timeSec+s.phase),0,Math.PI*2);
    ctx.fill();
    if(i % 18 === 0){
      ctx.strokeStyle = `rgba(119,214,255,${0.08*tw})`;
      ctx.beginPath();
      ctx.moveTo(s.x-4*dpr,s.y); ctx.lineTo(s.x+4*dpr,s.y);
      ctx.moveTo(s.x,s.y-4*dpr); ctx.lineTo(s.x,s.y+4*dpr);
      ctx.stroke();
    }
  });

  state.comets.forEach(c=>{
    c.x -= c.vx;
    c.y += c.vy;
    if(c.x < -60 || c.y > h + 40){
      c.x = w + rand(20, 180);
      c.y = rand(-60, h*0.2);
    }
    const tail = ctx.createLinearGradient(c.x,c.y,c.x + 80,c.y - 40);
    tail.addColorStop(0,"rgba(255,255,255,.8)");
    tail.addColorStop(1,"rgba(255,255,255,0)");
    ctx.strokeStyle = tail;
    ctx.lineWidth = 2*dpr;
    ctx.beginPath();
    ctx.moveTo(c.x,c.y); ctx.lineTo(c.x + 80,c.y - 40);
    ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,.9)";
    ctx.beginPath(); ctx.arc(c.x,c.y,2.2*dpr,0,Math.PI*2); ctx.fill();
  });

  for(let y=0; y<h; y += 4*dpr){
    ctx.fillStyle = `rgba(255,255,255,${0.008 + 0.004*Math.sin(y*0.05 + state.timeSec*0.9)})`;
    ctx.fillRect(0,y,w,1*dpr);
  }
}

function drawStage1(ctx,w,h){
  const dpr = window.devicePixelRatio || 1;
  const m = {l:72*dpr,r:24*dpr,t:36*dpr,b:54*dpr};
  const pw = w - m.l - m.r, ph = h - m.t - m.b;
  const arrX = state.mission.stage1.wavelengths;
  const arrY = state.mission.stage1.noisy;
  const maxY = Math.max(...arrY) * 1.05;

  const sunX = 74*dpr;
  const sunY = 74*dpr;
  const sunR = 32*dpr + 6*dpr*Math.sin(state.timeSec*1.4);
  const glow = ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR*2.4);
  glow.addColorStop(0,"rgba(255,220,130,.85)");
  glow.addColorStop(.35,"rgba(255,154,54,.36)");
  glow.addColorStop(1,"rgba(255,154,54,0)");
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR*2.4,0,Math.PI*2); ctx.fill();
  const core = ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR);
  core.addColorStop(0,"#fff6bf");
  core.addColorStop(.55,"#ffd166");
  core.addColorStop(1,"#ff8c42");
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,Math.PI*2); ctx.fill();

  for(let i=0;i<10;i++){
    const a = state.timeSec*0.6 + i * Math.PI/5;
    ctx.strokeStyle = `rgba(255,189,97,${0.15 + 0.08*Math.sin(a*3)})`;
    ctx.lineWidth = 2*dpr;
    ctx.beginPath();
    ctx.moveTo(sunX + Math.cos(a)*sunR*1.1, sunY + Math.sin(a)*sunR*1.1);
    ctx.lineTo(sunX + Math.cos(a)*sunR*1.7, sunY + Math.sin(a)*sunR*1.7);
    ctx.stroke();
  }

  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,.16)";
  ctx.lineWidth = 1*dpr;
  ctx.strokeRect(m.l,m.t,pw,ph);

  for(let i=0;i<=4;i++){
    const gy = m.t + (ph/4)*i;
    ctx.strokeStyle = "rgba(255,255,255,.06)";
    ctx.beginPath(); ctx.moveTo(m.l,gy); ctx.lineTo(m.l+pw,gy); ctx.stroke();
  }

  const fillGrad = ctx.createLinearGradient(0,m.t,0,m.t+ph);
  fillGrad.addColorStop(0,"rgba(119,214,255,.35)");
  fillGrad.addColorStop(1,"rgba(119,214,255,0)");
  ctx.beginPath();
  arrX.forEach((nm,i)=>{
    const x = m.l + (nm - 200) / (2200 - 200) * pw;
    const y = m.t + ph - (arrY[i] / maxY) * ph;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.lineTo(m.l+pw, m.t+ph);
  ctx.lineTo(m.l, m.t+ph);
  ctx.closePath();
  ctx.fillStyle = fillGrad;
  ctx.fill();

  ctx.beginPath();
  arrX.forEach((nm,i)=>{
    const x = m.l + (nm - 200) / (2200 - 200) * pw;
    const y = m.t + ph - (arrY[i] / maxY) * ph;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle = "#77d6ff";
  ctx.lineWidth = 2.6*dpr;
  ctx.shadowColor = "rgba(119,214,255,.5)";
  ctx.shadowBlur = 10*dpr;
  ctx.stroke();
  ctx.shadowBlur = 0;

  const scanX = m.l + ((Math.sin(state.timeSec*1.15)+1)/2) * pw;
  const scan = ctx.createLinearGradient(scanX-30*dpr,0,scanX+30*dpr,0);
  scan.addColorStop(0,"rgba(255,255,255,0)");
  scan.addColorStop(0.5,"rgba(255,255,255,.18)");
  scan.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle = scan;
  ctx.fillRect(scanX-30*dpr,m.t,60*dpr,ph);

  if(state.selectedPeakNm !== null){
    const xSel = m.l + (state.selectedPeakNm - 200)/(2200 - 200) * pw;
    ctx.strokeStyle = "#ffd166";
    ctx.setLineDash([7*dpr,5*dpr]);
    ctx.beginPath(); ctx.moveTo(xSel,m.t); ctx.lineTo(xSel,m.t+ph); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#ffd166";
    ctx.fillText(fmtNum0(state.selectedPeakNm)+" nm", xSel + 8*dpr, m.t + 18*dpr);
  }

  const xTrue = m.l + (state.mission.stage1.truePeakNm - 200)/(2200 - 200) * pw;
  if(state.stageSolved[1]){
    ctx.strokeStyle = "#72f1b8";
    ctx.setLineDash([5*dpr,4*dpr]);
    ctx.beginPath(); ctx.moveTo(xTrue,m.t); ctx.lineTo(xTrue,m.t+ph); ctx.stroke();
    ctx.setLineDash([]);
  }

  drawGlassPanel(ctx, m.l + pw*0.63, 18*dpr, 170*dpr, 42*dpr, "Thermal shield spectrum");
  ctx.font = `${12*dpr}px sans-serif`;
  ctx.fillStyle = "rgba(255,255,255,.75)";
  ctx.fillText("200 nm", m.l, h - 16*dpr);
  ctx.fillText("2200 nm", w - 78*dpr, h - 16*dpr);
  ctx.fillText("I", 18*dpr, m.t + 10*dpr);
  ctx.fillStyle = "rgba(255,255,255,.82)";
  ctx.fillText(tr("selectedPeak")+": " + (state.selectedPeakNm ? fmtNum0(state.selectedPeakNm)+" nm" : "—"), m.l, 18*dpr);
  ctx.restore();
}

function drawStage2(ctx,w,h){
  const dpr = window.devicePixelRatio || 1;
  const wallX = w * 0.42;
  const chamberY = h * 0.14;
  const chamberH = h * 0.62;
  const lambda = Number(q("lambdaRange").value);
  const intensity = Number(q("intensityRange").value);
  const hue = clamp(700 - lambda, 0, 500) * 0.6;
  const photonColor = `hsl(${hue}, 95%, 65%)`;
  const live = calcStage2();
  const vis = state.stage2Viz || { checked:false, emitted:false, success:false, current:0, pulse:0, reason:"idle" };
  const targetI = state.mission.stage2.targetI;

  drawGlassPanel(ctx, 24*dpr, 22*dpr, 176*dpr, 42*dpr, "Photon Lock arena");
  ctx.save();

  // Arena background
  const arenaGrad = ctx.createLinearGradient(0,chamberY,w,chamberY+chamberH);
  arenaGrad.addColorStop(0,"rgba(119,214,255,.04)");
  arenaGrad.addColorStop(.5,"rgba(114,241,184,.03)");
  arenaGrad.addColorStop(1,"rgba(255,139,216,.04)");
  ctx.fillStyle = arenaGrad;
  roundedRect(ctx, 18*dpr, chamberY-12*dpr, w-36*dpr, chamberH+24*dpr, 22*dpr);
  ctx.fill();

  const sourceX = 88*dpr;
  const sourceY = chamberY + chamberH*0.5;
  const coreX = w*0.80;
  const coreY = chamberY + chamberH*0.44;

  // ========== LEFT: PHOTON SOURCE ==========
  const srcGlow = ctx.createRadialGradient(sourceX,sourceY,0,sourceX,sourceY,70*dpr);
  srcGlow.addColorStop(0, "rgba(255,209,102,.34)");
  srcGlow.addColorStop(1, "rgba(255,209,102,0)");
  ctx.fillStyle = srcGlow;
  ctx.beginPath(); ctx.arc(sourceX,sourceY,70*dpr,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.14)";
  roundedRect(ctx, 40*dpr, sourceY-36*dpr, 76*dpr, 72*dpr, 16*dpr);
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.22)";
  ctx.lineWidth = 2*dpr;
  ctx.stroke();
  ctx.fillStyle = photonColor;
  ctx.beginPath(); ctx.arc(sourceX-8*dpr, sourceY, 20*dpr, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(sourceX+6*dpr, sourceY-10*dpr, 38*dpr, 20*dpr);

  // ========== CATHODE WALL ==========
  const cathGrad = ctx.createLinearGradient(wallX-10*dpr,chamberY,wallX+26*dpr,chamberY);
  cathGrad.addColorStop(0,"rgba(255,255,255,.14)");
  cathGrad.addColorStop(1,"rgba(155,180,209,.92)");
  ctx.fillStyle = cathGrad;
  ctx.fillRect(wallX, chamberY, 18*dpr, chamberH);
  ctx.fillStyle = "#eef6ff";
  ctx.font = `700 ${14*dpr}px sans-serif`;
  ctx.fillText(tr(state.mission.stage2.material.key), wallX - 14*dpr, chamberY - 10*dpr);

  // ========== PHOTON STREAM — scales dramatically with intensity ==========
  // intensity 10 → 2 photons   |   50 → 12   |   90 → 22
  const photonCount = Math.max(1, Math.round(intensity / 4.2));
  const flightZone = wallX - 130*dpr;  // horizontal travel space
  const vertSpread = chamberH * 0.75;  // max vertical spread
  // At low intensity photons are sparse & narrow; at high, dense & wide
  const activeSpread = vertSpread * clamp(intensity / 90, 0.15, 1.0);

  for(let i = 0; i < photonCount; i++){
    // Stagger photons in time and space
    const speed = (100 + (i % 5) * 25) * dpr;
    const tFrac = ((state.timeSec * speed + i * 41 * dpr) % Math.max(1, flightZone)) / Math.max(1, flightZone);
    const px = 130 * dpr + tFrac * flightZone;

    // Vertical lane — evenly distributed within activeSpread
    const laneCount = Math.max(1, Math.min(photonCount, 14));
    const laneIndex = i % laneCount;
    const py = sourceY - activeSpread/2 + (laneIndex / Math.max(1, laneCount - 1)) * activeSpread;
    const wobble = Math.sin(state.timeSec * 5.5 + i * 1.3) * 3 * dpr;

    // Wavy trail (shows wave nature)
    ctx.strokeStyle = photonColor;
    ctx.lineWidth = (1.4 + 0.4 * (intensity / 90)) * dpr;
    ctx.globalAlpha = 0.35 + 0.45 * (intensity / 90);
    ctx.beginPath();
    for(let p = 0; p < 10; p++){
      const tx = px - p * 3.2 * dpr;
      const ty = py + wobble + Math.sin(p * 0.85 + state.timeSec * 6 + i * 0.8) * 3.2 * dpr;
      if(p === 0) ctx.moveTo(tx, ty); else ctx.lineTo(tx, ty);
    }
    ctx.stroke();

    // Bright photon head (particle nature)
    ctx.globalAlpha = 0.6 + 0.4 * (intensity / 90);
    ctx.fillStyle = photonColor;
    ctx.shadowColor = photonColor;
    ctx.shadowBlur = (3 + 3 * (intensity / 90)) * dpr;
    ctx.beginPath();
    ctx.arc(px, py + wobble, (2.5 + 0.8 * Math.sin(state.timeSec * 4 + i * 2)) * dpr, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Beam glow (wider and brighter at high intensity)
  const beamAlpha = 0.015 + 0.10 * (intensity / 90);
  ctx.fillStyle = `rgba(255,255,255,${beamAlpha})`;
  ctx.fillRect(130*dpr, sourceY - activeSpread/2 - 8*dpr, flightZone, activeSpread + 16*dpr);

  // ========== PHOTON COUNTER (live, bottom-left) ==========
  ctx.fillStyle = "rgba(255,255,255,.82)";
  ctx.font = `700 ${13*dpr}px sans-serif`;
  const cntLabel = state.lang==="el" ? "Φωτόνια/s" : state.lang==="it" ? "Fotoni/s" : "Photons/s";
  const cntWord = intensity < 20 ? (state.lang==="el"?"ελάχιστα":"very few")
    : intensity < 40 ? (state.lang==="el"?"λίγα":"few")
    : intensity < 65 ? (state.lang==="el"?"μέτρια":"moderate")
    : (state.lang==="el"?"πολλά":"many");
  ctx.fillText(`${cntLabel}: ≈${fmtNum0(intensity)}  (${cntWord})`, 28*dpr, h - 76*dpr);

  // ========== LANE TO LOCK ==========
  ctx.strokeStyle = "rgba(255,255,255,.10)";
  ctx.setLineDash([8*dpr,7*dpr]);
  ctx.lineWidth = 2*dpr;
  ctx.beginPath();
  ctx.moveTo(wallX + 22*dpr, sourceY);
  ctx.lineTo(coreX - 72*dpr, coreY);
  ctx.stroke();
  ctx.setLineDash([]);

  // ========== ELECTRONS (only after Check, count proportional to intensity) ==========
  if(vis.checked && vis.emitted){
    const electronCount = Math.max(3, Math.round(vis.current / 5));
    for(let i = 0; i < electronCount; i++){
      const phase = (state.timeSec * 1.5 + i * 0.09 + vis.pulse * 0.6) % 1;
      const ex = wallX + 26*dpr + phase * (coreX - wallX - 120*dpr);
      const ey = sourceY + (coreY - sourceY) * phase + Math.sin(phase * 10 + i) * 14 * dpr;
      ctx.shadowColor = "rgba(114,241,184,.6)";
      ctx.shadowBlur = 12*dpr;
      ctx.fillStyle = "#72f1b8";
      ctx.beginPath();
      ctx.arc(ex, ey, 4.6*dpr, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = "rgba(114,241,184,.92)";
    ctx.font = `700 ${13*dpr}px sans-serif`;
    const elLabel = tr("stage2ElectronStream");
    ctx.fillText(`${elLabel}: ${fmtNum0(vis.current)} a.u.`, wallX + 28*dpr, chamberY + chamberH - 4*dpr);
  }

  // ========== THRESHOLD FAIL (X-mark after Check when no emission) ==========
  if(vis.checked && !vis.emitted){
    ctx.strokeStyle = "rgba(255,107,107,.85)";
    ctx.lineWidth = 5*dpr;
    const mx = (wallX + 26*dpr + coreX - 72*dpr) / 2;
    const my = (sourceY + coreY) / 2;
    ctx.beginPath(); ctx.moveTo(mx - 22*dpr, my - 22*dpr); ctx.lineTo(mx + 22*dpr, my + 22*dpr); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx + 22*dpr, my - 22*dpr); ctx.lineTo(mx - 22*dpr, my + 22*dpr); ctx.stroke();
    ctx.fillStyle = "rgba(255,107,107,.95)";
    ctx.font = `700 ${14*dpr}px sans-serif`;
    ctx.fillText(tr("stage2ThresholdVisual"), mx - 44*dpr, my + 40*dpr);
  }

  // ========== LOCK CORE (right side) ==========
  const detectorColor = !vis.checked ? "119,214,255" : vis.success ? "114,241,184" : "255,107,107";
  const detectorGlow = ctx.createRadialGradient(coreX,coreY,0,coreX,coreY,92*dpr);
  detectorGlow.addColorStop(0, `rgba(${detectorColor},${vis.checked ? 0.30 + 0.18*vis.pulse : 0.16})`);
  detectorGlow.addColorStop(1, `rgba(${detectorColor},0)`);
  ctx.fillStyle = detectorGlow;
  ctx.beginPath(); ctx.arc(coreX,coreY,92*dpr,0,Math.PI*2); ctx.fill();

  ctx.lineWidth = 4*dpr;
  ctx.strokeStyle = `rgba(${detectorColor},.92)`;
  ctx.beginPath();
  ctx.arc(coreX, coreY, 36*dpr + (vis.pulse||0)*4*dpr, 0, Math.PI*2);
  ctx.stroke();

  ctx.lineWidth = 2*dpr;
  for(let i=0;i<6;i++){
    const ang0 = -Math.PI/2 + i*Math.PI/3 + state.timeSec*0.18;
    ctx.strokeStyle = `rgba(${detectorColor},${vis.checked ? 0.85 : 0.35})`;
    ctx.beginPath(); ctx.arc(coreX,coreY,56*dpr,ang0,ang0+Math.PI/6); ctx.stroke();
  }
  ctx.fillStyle = "rgba(8,17,31,.95)";
  ctx.beginPath(); ctx.arc(coreX,coreY,24*dpr,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = `rgba(${detectorColor},.98)`;
  ctx.font = `900 ${18*dpr}px sans-serif`;
  ctx.textAlign = "center";
  ctx.fillText("LOCK", coreX, coreY + 7*dpr);
  ctx.textAlign = "left";

  // Success/fail effects after Check
  if(vis.checked){
    if(vis.success){
      for(let i=0;i<7;i++){
        const ang = state.timeSec*4 + i*(Math.PI*2/7);
        const r = 62*dpr + Math.sin(state.timeSec*7+i)*6*dpr;
        ctx.strokeStyle = `rgba(114,241,184,${0.45+0.24*(vis.pulse||0)})`;
        ctx.lineWidth = 2.2*dpr;
        ctx.beginPath();
        ctx.moveTo(coreX+Math.cos(ang)*30*dpr, coreY+Math.sin(ang)*30*dpr);
        ctx.lineTo(coreX+Math.cos(ang)*r, coreY+Math.sin(ang)*r);
        ctx.stroke();
      }
    } else {
      for(let i=0;i<6;i++){
        const j = Math.sin(state.timeSec*18+i)*10*dpr;
        ctx.strokeStyle = vis.emitted ? `rgba(255,107,107,${0.34+0.18*(vis.pulse||0)})` : `rgba(255,183,3,${0.34+0.18*(vis.pulse||0)})`;
        ctx.lineWidth = 2.4*dpr;
        ctx.beginPath();
        ctx.moveTo(coreX-30*dpr, coreY-24*dpr+j*0.08);
        ctx.lineTo(coreX+30*dpr, coreY+24*dpr-j*0.08);
        ctx.stroke();
      }
    }
  }

  drawGlassPanel(ctx, coreX-88*dpr, coreY+74*dpr, 176*dpr, 38*dpr,
    !vis.checked ? tr("stage2Neutral") : (vis.success ? tr("stage2SuccessVisual") : tr("stage2FailVisual")));

  // ========== COIL MECHANISM GAUGE ==========
  // Shows WHY current must be in a specific range
  const gaugeX = coreX - 100*dpr;
  const gaugeY2 = coreY + 122*dpr;
  const gaugeW = 200*dpr;
  const gaugeH2 = 12*dpr;
  // Use live current when not checked, checked current when checked
  const displayI = vis.checked ? vis.current : (live.K > 0 ? live.current : 0);
  const iRatio = targetI > 0 ? displayI / targetI : 0;

  // Gauge track
  ctx.fillStyle = "rgba(255,255,255,.07)";
  roundedRect(ctx, gaugeX, gaugeY2, gaugeW, gaugeH2, 6*dpr);
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.12)";
  ctx.lineWidth = 1*dpr;
  ctx.stroke();

  // Color zones painted on track: blue | green | red
  const zoneW = gaugeW / 3;
  // "Too weak" zone
  ctx.fillStyle = "rgba(119,214,255,.15)";
  roundedRect(ctx, gaugeX, gaugeY2, zoneW, gaugeH2, 6*dpr);
  ctx.fill();
  // "Optimal" zone
  ctx.fillStyle = "rgba(114,241,184,.18)";
  ctx.fillRect(gaugeX + zoneW, gaugeY2, zoneW, gaugeH2);
  // "Overheat" zone
  ctx.fillStyle = "rgba(255,107,107,.15)";
  roundedRect(ctx, gaugeX + 2*zoneW, gaugeY2, zoneW, gaugeH2, 6*dpr);
  ctx.fill();

  // Current pointer
  const ptrFrac = clamp(iRatio / 2, 0, 1); // 0..2 mapped to 0..1 of gauge
  const ptrX = gaugeX + ptrFrac * gaugeW;
  ctx.fillStyle = iRatio < 0.7 ? "#77d6ff" : iRatio < 1.35 ? "#72f1b8" : "#ff6b6b";
  ctx.beginPath();
  ctx.moveTo(ptrX, gaugeY2 - 4*dpr);
  ctx.lineTo(ptrX - 5*dpr, gaugeY2 - 10*dpr);
  ctx.lineTo(ptrX + 5*dpr, gaugeY2 - 10*dpr);
  ctx.closePath();
  ctx.fill();
  // Pointer line
  ctx.strokeStyle = ctx.fillStyle;
  ctx.lineWidth = 2*dpr;
  ctx.beginPath();
  ctx.moveTo(ptrX, gaugeY2 - 4*dpr);
  ctx.lineTo(ptrX, gaugeY2 + gaugeH2 + 2*dpr);
  ctx.stroke();

  // Zone labels
  ctx.font = `${9*dpr}px sans-serif`;
  ctx.fillStyle = "rgba(119,214,255,.75)";
  const weakLabel = state.lang==="el" ? "αδύναμα" : state.lang==="it" ? "deboli" : "weak";
  ctx.fillText(weakLabel, gaugeX + 4*dpr, gaugeY2 + gaugeH2 + 14*dpr);
  ctx.fillStyle = "rgba(114,241,184,.85)";
  const optLabel = state.lang==="el" ? "βέλτιστο ✓" : state.lang==="it" ? "ottimale ✓" : "optimal ✓";
  ctx.textAlign = "center";
  ctx.fillText(optLabel, gaugeX + 1.5*zoneW, gaugeY2 + gaugeH2 + 14*dpr);
  ctx.textAlign = "left";
  ctx.fillStyle = "rgba(255,107,107,.85)";
  const hotLabel = state.lang==="el" ? "υπερθέρμ. ⚠" : state.lang==="it" ? "surriscald. ⚠" : "overheat ⚠";
  ctx.textAlign = "right";
  ctx.fillText(hotLabel, gaugeX + gaugeW - 2*dpr, gaugeY2 + gaugeH2 + 14*dpr);
  ctx.textAlign = "left";

  // Coil header label
  ctx.font = `700 ${11*dpr}px sans-serif`;
  const coilTitle = state.lang==="el" ? "⚡ Πηνία ηλεκτρομαγνήτη — κατάσταση:"
    : state.lang==="it" ? "⚡ Bobine elettromagnete — stato:"
    : "⚡ Electromagnet coils — status:";
  const coilMsg = iRatio < 0.01
    ? (state.lang==="el" ? " χωρίς ρεύμα" : " no current")
    : iRatio < 0.7
    ? (state.lang==="el" ? " δύναμη ανεπαρκής, μοχλός ακίνητος" : " force insufficient, bolt stuck")
    : iRatio < 1.35
    ? (state.lang==="el" ? " δύναμη σωστή, μοχλός γυρνά ✓" : " force correct, bolt turns ✓")
    : (state.lang==="el" ? " ΥΠΕΡΘΕΡΜΑΝΣΗ — μοχλός κολλημένος!" : " OVERHEATING — bolt seized!");
  ctx.fillStyle = iRatio < 0.7 ? "rgba(119,214,255,.90)" : iRatio < 1.35 ? "rgba(114,241,184,.95)" : "rgba(255,107,107,.95)";
  ctx.fillText(coilTitle + coilMsg, gaugeX - 10*dpr, gaugeY2 - 10*dpr);

  // ========== AWAIT / BOTTOM INFO ==========
  if(!vis.checked){
    ctx.fillStyle = "rgba(255,255,255,.82)";
    ctx.font = `700 ${13*dpr}px sans-serif`;
    ctx.fillText(tr("stage2Await"), 28*dpr, h - 14*dpr);
  }

  ctx.fillStyle = "rgba(255,255,255,.84)";
  ctx.font = `700 ${14*dpr}px sans-serif`;
  ctx.fillText("λ = " + fmtNum0(lambda) + " nm", 28*dpr, h - 56*dpr);
  ctx.fillText("Kmax = " + fmtNum(live.K,2) + " eV", 28*dpr, h - 38*dpr);

  // === KEY INSIGHT: intensity → photon count → electron count → coil current ===
  const chainColor = live.K > 0 ? "rgba(114,241,184,.90)" : "rgba(255,183,3,.85)";
  ctx.fillStyle = chainColor;
  ctx.font = `600 ${11*dpr}px sans-serif`;
  const chainText = state.lang==="el"
    ? `Ι(ένταση) ${fmtNum0(intensity)} → φωτόνια ${fmtNum0(photonCount)}/s → ηλεκτρόνια ≈${fmtNum0(live.current)} a.u.`
    : state.lang==="it"
    ? `I(intensità) ${fmtNum0(intensity)} → fotoni ${fmtNum0(photonCount)}/s → elettroni ≈${fmtNum0(live.current)} a.u.`
    : `I(intensity) ${fmtNum0(intensity)} → photons ${fmtNum0(photonCount)}/s → electrons ≈${fmtNum0(live.current)} a.u.`;
  ctx.fillText(chainText, 28*dpr, h - 20*dpr);

  ctx.restore();
}

function drawStage3(ctx,w,h){
  const dpr = window.devicePixelRatio || 1;
  const slitX = w * 0.38;
  const screenX = w * 0.78;
  const midY = h * 0.5;
  const s3 = calcStage3();
  const isClassical = state.stage3ViewMode === "classical";

  const panelTitle = isClassical
    ? (state.lang==="el" ? "📐 Κλασική προσομοίωση" : state.lang==="it" ? "📐 Simulazione classica" : "📐 Classical simulation")
    : "🔬 Nano-slit aligner";
  drawGlassPanel(ctx, 24*dpr, 24*dpr, 220*dpr, 42*dpr, panelTitle);
  ctx.save();

  const gridGrad = ctx.createLinearGradient(0,0,w,0);
  gridGrad.addColorStop(0, isClassical ? "rgba(255,107,107,.05)" : "rgba(119,214,255,.05)");
  gridGrad.addColorStop(1, isClassical ? "rgba(255,183,3,.04)" : "rgba(255,139,216,.04)");
  ctx.fillStyle = gridGrad;
  ctx.fillRect(0,h*0.18,w,h*0.5);
  for(let gx=0;gx<w;gx+=36*dpr){
    ctx.strokeStyle = "rgba(255,255,255,.04)";
    ctx.beginPath(); ctx.moveTo(gx,h*0.14); ctx.lineTo(gx,h*0.88); ctx.stroke();
  }

  ctx.fillStyle = "#c7d6ea";
  ctx.fillRect(slitX, h*0.14, 12*dpr, h*0.26);
  ctx.fillRect(slitX, h*0.60, 12*dpr, h*0.26);
  const gapPx = clamp(Number(q("slitRange").value) / state.mission.stage3.gateMax * (h*0.18), 8*dpr, h*0.22);
  ctx.clearRect(slitX, midY-gapPx/2, 12*dpr, gapPx);
  ctx.fillStyle = "#eef6ff";
  ctx.font = `700 ${14*dpr}px sans-serif`;
  ctx.fillText("a", slitX - 18*dpr, midY - gapPx/2 - 6*dpr);

  ctx.fillStyle = "#9bb4d1";
  ctx.fillRect(screenX, h*0.12, 8*dpr, h*0.76);

  for(let i=0;i<8;i++){
    const bx = 34*dpr + i*42*dpr + ((state.timeSec*58*dpr) % 20*dpr);
    ctx.strokeStyle = `rgba(${isClassical?"255,140,140":"119,214,255"},${0.45+0.1*Math.sin(i+state.timeSec*2)})`;
    ctx.lineWidth = 1.8*dpr;
    ctx.beginPath(); ctx.moveTo(bx,midY); ctx.lineTo(slitX,midY); ctx.stroke();
  }

  const classicalSpotPx = gapPx;
  const quantumSpotPx = (s3.lambdaDb > 0) ? clamp(s3.spotMm / 40 * h*0.65, 8*dpr, h*0.62) : gapPx;
  const targetPx = clamp(state.mission.stage3.targetSpot / 40 * h*0.65, 8*dpr, h*0.62);

  if(isClassical){
    // ====== CLASSICAL MODE ======
    const cg = ctx.createLinearGradient(slitX+12*dpr,midY,screenX,midY);
    cg.addColorStop(0,"rgba(255,140,140,.08)");
    cg.addColorStop(0.7,"rgba(255,140,140,.18)");
    cg.addColorStop(1,"rgba(255,140,140,.25)");
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.moveTo(slitX+12*dpr,midY-gapPx/2);
    ctx.lineTo(screenX,midY-classicalSpotPx/2);
    ctx.lineTo(screenX,midY+classicalSpotPx/2);
    ctx.lineTo(slitX+12*dpr,midY+gapPx/2);
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = "rgba(255,140,140,.70)";
    ctx.lineWidth = 2*dpr;
    ctx.beginPath(); ctx.moveTo(slitX+12*dpr,midY-gapPx/2); ctx.lineTo(screenX,midY-classicalSpotPx/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(slitX+12*dpr,midY+gapPx/2); ctx.lineTo(screenX,midY+classicalSpotPx/2); ctx.stroke();

    for(let i=0;i<14;i++){
      const t = ((state.timeSec*1.5+i*0.07)%1);
      const ex = slitX+14*dpr + t*(screenX-slitX-20*dpr);
      const lane = (i%5)/4 - 0.5;
      const ey = midY + lane*classicalSpotPx*0.8;
      ctx.fillStyle = `rgba(255,160,160,${0.5+0.5*t})`;
      ctx.beginPath(); ctx.arc(ex,ey,(2+t)*dpr,0,Math.PI*2); ctx.fill();
    }

    ctx.strokeStyle = "rgba(255,140,140,.65)";
    ctx.lineWidth = 2*dpr;
    ctx.strokeRect(screenX+6*dpr, midY-classicalSpotPx/2, 20*dpr, classicalSpotPx);

    if(s3.lambdaDb > 0){
      ctx.strokeStyle = "rgba(119,214,255,.40)";
      ctx.lineWidth = 1.5*dpr;
      ctx.setLineDash([5*dpr,4*dpr]);
      ctx.beginPath(); ctx.moveTo(slitX+12*dpr,midY-gapPx/2); ctx.lineTo(screenX,midY-quantumSpotPx/2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(slitX+12*dpr,midY+gapPx/2); ctx.lineTo(screenX,midY+quantumSpotPx/2); ctx.stroke();
      ctx.strokeRect(screenX-24*dpr, midY-quantumSpotPx/2, 30*dpr, quantumSpotPx);
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(119,214,255,.60)";
      ctx.font = `600 ${10*dpr}px sans-serif`;
      const qL = state.lang==="el"?"Κβαντική πρόβλεψη →":state.lang==="it"?"Previsione quantistica →":"Quantum prediction →";
      ctx.fillText(qL, screenX+16*dpr, midY-quantumSpotPx/2-6*dpr);
    }

    ctx.fillStyle = "rgba(255,140,140,.90)";
    ctx.font = `800 ${13*dpr}px sans-serif`;
    const wL = state.lang==="el"?"⚠ Κλασική: δέσμη = σχισμή (ΛΑΘΟΣ!)":state.lang==="it"?"⚠ Classica: fascio = fessura (SBAGLIATO!)":"⚠ Classical: beam = slit width (WRONG!)";
    ctx.fillText(wL, 24*dpr, h*0.14+10*dpr);

    ctx.fillStyle = "rgba(255,255,255,.75)";
    ctx.font = `700 ${13*dpr}px sans-serif`;
    const csL = state.lang==="el"?"Κλασικό Δx = πλάτος σχισμής":state.lang==="it"?"Classico Δx = larghezza fessura":"Classical Δx = slit width";
    ctx.fillText(csL, 18*dpr, h-32*dpr);
    if(s3.lambdaDb > 0){
      const rL = state.lang==="el"?"Κβαντικό Δx ≈ ":state.lang==="it"?"Quantistico Δx ≈ ":"Quantum Δx ≈ ";
      ctx.fillStyle = "rgba(119,214,255,.85)";
      ctx.fillText(rL + fmtNum(s3.spotMm,2) + " mm", 18*dpr, h-12*dpr);
    }

  } else {
    // ====== QUANTUM MODE ======
    ctx.strokeStyle = "rgba(255,107,107,.45)";
    ctx.lineWidth = 1.5*dpr;
    ctx.setLineDash([5*dpr,4*dpr]);
    ctx.beginPath(); ctx.moveTo(slitX+12*dpr,midY-gapPx/2); ctx.lineTo(screenX,midY-classicalSpotPx/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(slitX+12*dpr,midY+gapPx/2); ctx.lineTo(screenX,midY+classicalSpotPx/2); ctx.stroke();
    ctx.strokeRect(screenX+14*dpr, midY-classicalSpotPx/2, 18*dpr, classicalSpotPx);
    ctx.setLineDash([]);
    ctx.fillStyle = "rgba(255,107,107,.65)";
    ctx.font = `600 ${10*dpr}px sans-serif`;
    ctx.fillText(tr("classicalGhostLabel"), screenX+16*dpr, midY+classicalSpotPx/2+16*dpr);

    if(s3.lambdaDb > 0){
      const spotPx = quantumSpotPx;
      const fx = state.fx.action && state.fx.action.stage===3 ? state.fx.action : null;
      const qg = ctx.createLinearGradient(slitX+12*dpr,midY,screenX,midY);
      qg.addColorStop(0,"rgba(119,214,255,.08)");
      qg.addColorStop(0.5,"rgba(255,209,102,.12)");
      qg.addColorStop(1,"rgba(255,209,102,.22)");
      ctx.fillStyle = qg;
      ctx.beginPath();
      ctx.moveTo(slitX+12*dpr,midY-gapPx/2);
      ctx.lineTo(screenX,midY-spotPx/2);
      ctx.lineTo(screenX,midY+spotPx/2);
      ctx.lineTo(slitX+12*dpr,midY+gapPx/2);
      ctx.closePath(); ctx.fill();

      ctx.strokeStyle = "rgba(119,214,255,.65)";
      ctx.lineWidth = 1.5*dpr;
      ctx.beginPath(); ctx.moveTo(slitX+12*dpr,midY-gapPx/2); ctx.lineTo(screenX,midY-spotPx/2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(slitX+12*dpr,midY+gapPx/2); ctx.lineTo(screenX,midY+spotPx/2); ctx.stroke();

      for(let i=0;i<Math.max(6,Math.round(15*(s3.lambdaDb/2)));i++){
        const t = ((state.timeSec*1.2+i*0.07)%1);
        const baseY = midY + Math.sin(i*2.718+state.timeSec*0.7)*spotPx/2*t;
        const ex = slitX+14*dpr + t*(screenX-slitX-20*dpr);
        ctx.fillStyle = `rgba(255,209,102,${0.4+0.5*t})`;
        ctx.shadowColor = "rgba(255,209,102,.4)";
        ctx.shadowBlur = 6*dpr;
        ctx.beginPath(); ctx.arc(ex,baseY,(1.8+1.2*t)*dpr,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
      }

      ctx.strokeStyle = "#72f1b8";
      ctx.setLineDash([6*dpr,5*dpr]);
      ctx.strokeRect(screenX-20*dpr, midY-targetPx/2, 32*dpr, targetPx);
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(114,241,184,.80)";
      ctx.font = `600 ${10*dpr}px sans-serif`;
      ctx.fillText("target", screenX-18*dpr, midY-targetPx/2-6*dpr);

      for(let i=0;i<24;i++){
        const dy = (-spotPx/2)+(i/23)*spotPx;
        const alpha = Math.exp(-Math.pow(dy/(spotPx/4),2))*0.9;
        ctx.strokeStyle = `rgba(255,209,102,${alpha})`;
        ctx.lineWidth = 1.3*dpr;
        ctx.beginPath(); ctx.moveTo(screenX-60*dpr,midY+dy); ctx.lineTo(screenX,midY+dy); ctx.stroke();
      }
      ctx.strokeStyle = "rgba(255,209,102,.50)";
      ctx.lineWidth = 1.5*dpr;
      ctx.strokeRect(screenX-24*dpr, midY-spotPx/2, 32*dpr, spotPx);

      const spreadRatio = spotPx>1 && classicalSpotPx>1 ? (spotPx/classicalSpotPx) : 0;
      if(spreadRatio > 1.2){
        ctx.fillStyle = "rgba(255,209,102,.90)";
        ctx.font = `800 ${12*dpr}px sans-serif`;
        const sL = state.lang==="el"?`Κβαντικό: ${fmtNum(spreadRatio,1)}× φαρδύτερο!`:state.lang==="it"?`Quantistico: ${fmtNum(spreadRatio,1)}× più largo!`:`Quantum: ${fmtNum(spreadRatio,1)}× wider!`;
        ctx.fillText(sL, slitX+20*dpr, h*0.14+10*dpr);
      }

      if(fx && fx.timer>0.03){
        ctx.strokeStyle = `rgba(${fx.kind==="success"?"114,241,184":"255,107,107"},${0.45*fx.timer})`;
        ctx.lineWidth = 3*dpr;
        ctx.beginPath(); ctx.arc(screenX-4*dpr,midY,spotPx*0.55+(1-fx.timer)*36*dpr,-Math.PI/2,Math.PI/2); ctx.stroke();
      }

      ctx.fillStyle = "rgba(255,255,255,.82)";
      ctx.font = `700 ${14*dpr}px sans-serif`;
      ctx.fillText("Δx ≈ " + fmtNum(s3.spotMm,2) + " mm", 18*dpr, h-32*dpr);
      ctx.fillText("λe ≈ " + fmtNum(s3.lambdaDb,3) + " nm", 18*dpr, h-12*dpr);
    } else {
      ctx.fillStyle = "rgba(255,255,255,.82)";
      ctx.font = `700 ${14*dpr}px sans-serif`;
      ctx.fillText(tr("stage3Need2"), 18*dpr, h-20*dpr);
    }
  }
  ctx.restore();
}
function drawGlassPanel(ctx,x,y,w,h,label){
  const dpr = window.devicePixelRatio || 1;
  ctx.save();
  const g = ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,"rgba(255,255,255,.12)");
  g.addColorStop(1,"rgba(255,255,255,.04)");
  ctx.fillStyle = g;
  roundedRect(ctx,x,y,w,h,14*dpr);
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.12)";
  ctx.stroke();
  ctx.fillStyle = "rgba(238,246,255,.9)";
  ctx.font = `${12*dpr}px sans-serif`;
  ctx.fillText(label, x + 12*dpr, y + 26*dpr);
  ctx.restore();
}

function roundedRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function onPointerDown(e){
  if(!state.started) return;
  state.pointerDown = true;
  if(state.stage === 1){
    pickPeakFromEvent(e);
    blip(690,0.03,"sine");
  }
}
function onPointerMove(e){
  if(!state.started) return;
  if(state.pointerDown && state.stage === 1){
    pickPeakFromEvent(e);
  }
}
function onPointerUp(){
  state.pointerDown = false;
}
function pickPeakFromEvent(e){
  const canvas = q("simCanvas");
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const nm = clamp(200 + x * (2200 - 200), 200, 2200);
  state.selectedPeakNm = Math.round(nm);
  updateReadouts();
  render();
}

function makeStarfield(){
  const canvas = q("simCanvas");
  const w = canvas ? canvas.width || 1200 : 1200;
  const h = canvas ? canvas.height || 700 : 700;
  state.stars = [];
  for(let i=0;i<110;i++){
    state.stars.push({
      x: rand(0,w),
      y: rand(0,h),
      r: rand(0.7,2.2),
      a: rand(0.25,0.95),
      speed: rand(0.35,1.2),
      phase: rand(0,Math.PI*2)
    });
  }
  state.comets = [];
  for(let i=0;i<3;i++){
    state.comets.push({
      x: rand(0,w),
      y: rand(-50,h*0.25),
      vx: rand(1.5,3.0),
      vy: rand(0.5,1.1)
    });
  }
  state.nebula = [
    { x:w*0.20, y:h*0.18, r:180, color:"119,214,255", seed:0.3 },
    { x:w*0.82, y:h*0.16, r:160, color:"255,209,102", seed:1.2 },
    { x:w*0.58, y:h*0.78, r:200, color:"255,139,216", seed:2.0 }
  ];
}


function drawStage4(ctx,w,h){
  const dpr = window.devicePixelRatio || 1;
  const s4 = calcStage4();
  const targetL = state.mission.stage4.scatteredPm;
  const targetE = state.mission.stage4.recoilKeV;
  const err = (Math.abs(s4.scatteredPm - targetL) / targetL + Math.abs(s4.recoilKeV - targetE) / targetE) * 50;
  const stability = clamp(100 - err, 0, 100);
  const actionFx = state.fx.action && state.fx.action.stage === 4 ? state.fx.action : null;

  drawGlassPanel(ctx, 24*dpr, 24*dpr, 210*dpr, 42*dpr, "Compton storm // boss phase");
  ctx.save();

  const alarm = 0.18 + 0.07*Math.sin(state.timeSec*5.8);
  const alarmGrad = ctx.createLinearGradient(0,0,w,0);
  alarmGrad.addColorStop(0, `rgba(255,80,90,${alarm})`);
  alarmGrad.addColorStop(0.5, "rgba(255,140,80,0)");
  alarmGrad.addColorStop(1, `rgba(255,80,90,${alarm})`);
  ctx.fillStyle = alarmGrad;
  ctx.fillRect(0, 0, w, 20*dpr);

  const centerX = w * 0.46;
  const centerY = h * 0.52;
  const sourceX = 72*dpr;
  const detectorX = w * 0.84;
  const thetaRad = s4.thetaDeg * Math.PI / 180;
  const outLen = Math.min(w,h) * 0.28;
  const outX = centerX + Math.cos(-thetaRad) * outLen;
  const outY = centerY + Math.sin(-thetaRad) * outLen;

  const bossBarX = 28*dpr, bossBarY = 84*dpr, bossBarW = 220*dpr, bossBarH = 14*dpr;
  ctx.fillStyle = "rgba(255,255,255,.08)";
  ctx.fillRect(bossBarX, bossBarY, bossBarW, bossBarH);
  const bossGrad = ctx.createLinearGradient(bossBarX,0,bossBarX+bossBarW,0);
  bossGrad.addColorStop(0,"#ff6b6b"); bossGrad.addColorStop(0.55,"#ffd166"); bossGrad.addColorStop(1,"#72f1b8");
  ctx.fillStyle = bossGrad;
  ctx.fillRect(bossBarX, bossBarY, bossBarW * (stability/100), bossBarH);
  ctx.fillStyle = "rgba(255,255,255,.84)";
  ctx.font = `${12*dpr}px sans-serif`;
  ctx.fillText("flare firewall stability", bossBarX, bossBarY - 8*dpr);

  const hexR = 82*dpr;
  if(actionFx && actionFx.timer > 0.03){
    const pulseRgb = actionFx.kind === "success" ? "114,241,184" : "255,107,107";
    ctx.strokeStyle = `rgba(${pulseRgb},${0.38*actionFx.timer})`;
    ctx.lineWidth = 5*dpr;
    ctx.beginPath();
    ctx.arc(centerX, centerY, hexR + (1-actionFx.timer)*70*dpr, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.strokeStyle = "rgba(255,107,107,.75)";
  ctx.lineWidth = 3*dpr;
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a = Math.PI/6 + i*Math.PI/3;
    const x = detectorX + Math.cos(a) * hexR;
    const y = centerY + Math.sin(a) * hexR;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.stroke();

  for(let i=0;i<6;i++){
    ctx.strokeStyle = `rgba(255,107,107,${0.16 + 0.1*Math.sin(state.timeSec*4+i)})`;
    ctx.beginPath();
    ctx.arc(detectorX, centerY, 24*dpr + i*10*dpr, -1.2, 1.2);
    ctx.stroke();
  }

  const beamIn = ctx.createLinearGradient(sourceX,0,centerX,0);
  beamIn.addColorStop(0,"rgba(119,214,255,.0)");
  beamIn.addColorStop(.45,"rgba(119,214,255,.55)");
  beamIn.addColorStop(1,"rgba(119,214,255,.95)");
  ctx.strokeStyle = beamIn;
  ctx.lineWidth = 6*dpr;
  ctx.beginPath();
  ctx.moveTo(sourceX, centerY);
  ctx.lineTo(centerX, centerY);
  ctx.stroke();

  for(let i=0;i<7;i++){
    const px = sourceX + ((state.timeSec*180*dpr + i*44*dpr) % (centerX-sourceX));
    ctx.fillStyle = "rgba(119,214,255,.95)";
    ctx.beginPath(); ctx.arc(px, centerY, 3.2*dpr, 0, Math.PI*2); ctx.fill();
  }

  ctx.fillStyle = "rgba(255,255,255,.9)";
  ctx.beginPath(); ctx.arc(centerX, centerY, 9*dpr, 0, Math.PI*2); ctx.fill();
  const collisionGlow = ctx.createRadialGradient(centerX,centerY,0,centerX,centerY,42*dpr);
  collisionGlow.addColorStop(0,"rgba(255,255,255,.65)");
  collisionGlow.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle = collisionGlow;
  ctx.beginPath(); ctx.arc(centerX,centerY,42*dpr,0,Math.PI*2); ctx.fill();

  const beamOut = ctx.createLinearGradient(centerX,centerY,outX,outY);
  beamOut.addColorStop(0,"rgba(255,209,102,.95)");
  beamOut.addColorStop(1,"rgba(255,95,95,.22)");
  ctx.strokeStyle = beamOut;
  ctx.lineWidth = 4*dpr;
  ctx.beginPath();
  ctx.moveTo(centerX, centerY);
  ctx.lineTo(outX, outY);
  ctx.stroke();

  for(let i=0;i<6;i++){
    const t = ((state.timeSec*1.4 + i*0.16) % 1);
    const px = centerX + (outX-centerX)*t;
    const py = centerY + (outY-centerY)*t;
    ctx.fillStyle = "rgba(255,209,102,.95)";
    ctx.beginPath(); ctx.arc(px, py, 2.6*dpr, 0, Math.PI*2); ctx.fill();
  }

  const recoilX = centerX + 0.72*outLen*Math.cos(Math.PI/3);
  const recoilY = centerY + 0.72*outLen*Math.sin(Math.PI/3);
  ctx.strokeStyle = "rgba(114,241,184,.8)";
  ctx.lineWidth = 3*dpr;
  ctx.beginPath();
  ctx.moveTo(centerX, centerY);
  ctx.quadraticCurveTo(centerX + 50*dpr, centerY + 30*dpr, recoilX, recoilY);
  ctx.stroke();

  ctx.strokeStyle = "rgba(255,255,255,.25)";
  ctx.lineWidth = 1.6*dpr;
  ctx.beginPath();
  ctx.arc(centerX, centerY, 48*dpr, 0, -thetaRad, true);
  ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,.84)";
  ctx.fillText("θ = " + fmtNum0(s4.thetaDeg) + "°", centerX + 20*dpr, centerY - 28*dpr);

  ctx.fillStyle = "rgba(255,255,255,.86)";
  ctx.fillText("λ₀ = " + fmtNum(s4.lambda0Pm,1) + " pm", 30*dpr, h - 56*dpr);
  ctx.fillText("λ′ = " + fmtNum(s4.scatteredPm,1) + " pm", 30*dpr, h - 34*dpr);
  ctx.fillText("Eₑ = " + fmtNum(s4.recoilKeV,2) + " keV", 30*dpr, h - 12*dpr);

  const targetGhostY = centerY - 120*dpr;
  ctx.setLineDash([8*dpr,6*dpr]);
  ctx.strokeStyle = "rgba(114,241,184,.65)";
  ctx.beginPath();
  ctx.moveTo(centerX, centerY);
  ctx.lineTo(detectorX - 40*dpr, targetGhostY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = "rgba(114,241,184,.92)";
  ctx.fillText("target λ′ " + fmtNum(targetL,1) + " pm", detectorX - 110*dpr, targetGhostY - 10*dpr);

  // ========== LIVE COMPTON SCATTER DIAGRAM ==========
  // Mini polar plot showing Δλ vs θ — updates live as user drags angle slider
  const plotCx = w - 120*dpr;
  const plotCy = h - 100*dpr;
  const plotR = 70*dpr;
  const lambdaCpm = state.mission.stage4.lambdaCpm;

  // Background circle
  ctx.fillStyle = "rgba(0,0,0,.35)";
  ctx.beginPath(); ctx.arc(plotCx, plotCy, plotR+8*dpr, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.12)";
  ctx.lineWidth = 1*dpr;
  ctx.beginPath(); ctx.arc(plotCx, plotCy, plotR, 0, Math.PI*2); ctx.stroke();

  // Axis lines
  ctx.strokeStyle = "rgba(255,255,255,.08)";
  ctx.beginPath(); ctx.moveTo(plotCx-plotR,plotCy); ctx.lineTo(plotCx+plotR,plotCy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(plotCx,plotCy-plotR); ctx.lineTo(plotCx,plotCy+plotR); ctx.stroke();

  // Compton Δλ curve (polar: r = Δλ(θ), scaled)
  const maxDL = lambdaCpm * 2; // max shift at θ=180°
  ctx.strokeStyle = "rgba(255,209,102,.65)";
  ctx.lineWidth = 2*dpr;
  ctx.beginPath();
  for(let deg=0; deg<=360; deg+=3){
    const rad = deg * Math.PI / 180;
    const dl = lambdaCpm * (1 - Math.cos(rad));
    const r = (dl / maxDL) * plotR * 0.85;
    const px = plotCx + Math.cos(-rad) * r;
    const py = plotCy + Math.sin(-rad) * r;
    if(deg===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.stroke();

  // Current angle indicator (bright dot on the curve)
  const curRad = s4.thetaDeg * Math.PI / 180;
  const curDL = lambdaCpm * (1 - Math.cos(curRad));
  const curR = (curDL / maxDL) * plotR * 0.85;
  const dotX = plotCx + Math.cos(-curRad) * curR;
  const dotY = plotCy + Math.sin(-curRad) * curR;

  // Angle line from center
  ctx.strokeStyle = "rgba(119,214,255,.50)";
  ctx.lineWidth = 1.5*dpr;
  ctx.beginPath(); ctx.moveTo(plotCx, plotCy); ctx.lineTo(dotX, dotY); ctx.stroke();

  // Bright dot
  ctx.fillStyle = "#77d6ff";
  ctx.shadowColor = "rgba(119,214,255,.6)";
  ctx.shadowBlur = 10*dpr;
  ctx.beginPath(); ctx.arc(dotX, dotY, 5*dpr, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Target angle indicator (green dot)
  const tgtRad = state.mission.stage4.thetaDeg * Math.PI / 180;
  const tgtDL = lambdaCpm * (1 - Math.cos(tgtRad));
  const tgtR = (tgtDL / maxDL) * plotR * 0.85;
  const tgtDotX = plotCx + Math.cos(-tgtRad) * tgtR;
  const tgtDotY = plotCy + Math.sin(-tgtRad) * tgtR;
  ctx.fillStyle = "rgba(114,241,184,.7)";
  ctx.beginPath(); ctx.arc(tgtDotX, tgtDotY, 4*dpr, 0, Math.PI*2); ctx.fill();

  // Labels
  ctx.fillStyle = "rgba(255,255,255,.70)";
  ctx.font = `${10*dpr}px sans-serif`;
  ctx.fillText("Δλ(θ)", plotCx - plotR - 6*dpr, plotCy - plotR - 6*dpr);
  ctx.fillStyle = "rgba(119,214,255,.85)";
  ctx.fillText("θ=" + fmtNum0(s4.thetaDeg) + "°", dotX + 8*dpr, dotY - 6*dpr);
  ctx.fillStyle = "rgba(114,241,184,.75)";
  ctx.font = `${9*dpr}px sans-serif`;
  ctx.fillText("target", tgtDotX + 7*dpr, tgtDotY + 12*dpr);
  ctx.fillStyle = "rgba(255,209,102,.65)";
  ctx.fillText("Δλ=" + fmtNum(curDL,2) + "pm", plotCx - plotR, plotCy + plotR + 14*dpr);

  ctx.restore();
}

function initAudio(forceResume){
  if(!window.AudioContext && !window.webkitAudioContext) return;
  if(!state.audio.ctx){
    const AC = window.AudioContext || window.webkitAudioContext;
    state.audio.ctx = new AC();
    state.audio.master = state.audio.ctx.createGain();
    state.audio.master.gain.value = state.audio.enabled ? 0.05 : 0;
    state.audio.master.connect(state.audio.ctx.destination);
    state.audio.unlocked = true;
  }
  if(forceResume && state.audio.ctx.state === "suspended"){
    state.audio.ctx.resume();
  }
}

function blip(freq,dur,type="sine",volume=0.035){
  if(!state.audio.enabled) return;
  initAudio(false);
  if(!state.audio.ctx || !state.audio.master) return;
  const now = state.audio.ctx.currentTime;
  const osc = state.audio.ctx.createOscillator();
  const gain = state.audio.ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  osc.connect(gain);
  gain.connect(state.audio.master);
  osc.start(now);
  osc.stop(now + dur + 0.02);
}

function playSequence(freqs,durs,type="triangle",volume=0.04){
  if(!state.audio.enabled) return;
  initAudio(false);
  let offset = 0;
  freqs.forEach((f,i)=>{
    setTimeout(()=>blip(f,durs[i] || 0.08,type,volume), offset * 1000);
    offset += durs[i] || 0.08;
  });
}

function successTone(){
  playSequence([523,659,784],[0.06,0.06,0.12],"triangle",0.05);
  celebrateElement(q("stageChip"));
  celebrateElement(q("scoreVal"));
}
function failTone(){
  playSequence([330,247,196],[0.05,0.07,0.10],"sawtooth",0.045);
  shakeCanvas("hard");
}
function trapFailTone(){
  // Heavier, more frustrating: low buzzing descend + static
  playSequence([180,140,100,80],[0.08,0.10,0.12,0.20],"sawtooth",0.06);
  setTimeout(()=> blip(55, 0.25, "square", 0.04), 350);
  shakeCanvas("hard");
}

window.addEventListener("load", init);
</script>
