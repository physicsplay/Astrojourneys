<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quantum Rescue: The Photon Lock</title>
<style>
:root{
  --bg:#08111f;
  --panel:#101c30;
  --panel2:#142642;
  --ink:#eef6ff;
  --muted:#9bb4d1;
  --accent:#77d6ff;
  --accent2:#ffd166;
  --good:#72f1b8;
  --warn:#ffb703;
  --bad:#ff6b6b;
  --pink:#ff8bd8;
  --shadow:0 12px 28px rgba(0,0,0,.35);
  --radius:18px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  overflow:auto;
  font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
  background:
    radial-gradient(circle at 18% 18%, rgba(119,214,255,.14), transparent 26%),
    radial-gradient(circle at 82% 12%, rgba(255,209,102,.10), transparent 22%),
    radial-gradient(circle at 50% 100%, rgba(255,139,216,.08), transparent 18%),
    linear-gradient(180deg,#040914,#07101d 52%,#08111f);
  color:var(--ink);
}
.hidden{display:none !important}
.app{min-height:100vh;height:auto;display:flex;flex-direction:column}
.card{
  background:linear-gradient(180deg,rgba(15,27,47,.96),rgba(19,35,61,.92));
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
header{
  padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg,rgba(8,17,31,.80),rgba(8,17,31,.68));
  backdrop-filter:blur(10px);
}
.headerRow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
header h1{margin:0;font-size:1.16rem;letter-spacing:.2px}
header .sub{color:var(--muted);font-size:.93rem;margin-top:4px;max-width:900px}
.headerTools{display:flex;gap:8px;flex-wrap:wrap}
.toolBtn,.stageChip{
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
  color:var(--ink);
  padding:9px 12px;
  min-height:40px;
}
.stageChip{
  cursor:default;
  display:inline-flex;
  align-items:center;
  gap:8px;
  color:var(--accent);
}
.layout{flex:1;display:grid;grid-template-columns:1.35fr .95fr;gap:14px;padding:14px;min-height:0;align-items:start}
.canvasWrap{display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative}
.canvasTop{
  padding:12px 14px 10px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0)),
    radial-gradient(circle at top right, rgba(119,214,255,.10), transparent 35%);
}
.canvasTop h2{margin:0 0 6px;font-size:1rem}
.canvasTop .mission{color:var(--ink);font-size:.95rem;line-height:1.38}
.canvasTop .mini{color:var(--muted);font-size:.88rem;margin-top:3px}
.hudChips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.hudChip{
  display:inline-flex;align-items:center;
  padding:7px 10px;border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  font-size:.84rem;color:var(--ink)
}
.hudChip strong{color:var(--accent2);margin-right:6px}
.stageNav{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.stageNav button, .controls button, .modal button, select, input[type=range], .toolBtn{
  border-radius:12px;border:1px solid rgba(255,255,255,.12)
}
.stageBtn{
  background:#0b1730;color:var(--ink);padding:8px 10px;cursor:pointer;
  transition:transform .16s ease, filter .16s ease, box-shadow .18s ease;
}
.stageBtn:hover,.toolBtn:hover,button:hover{filter:brightness(1.06)}
.stageBtn.active{outline:2px solid var(--accent);background:#12264a;box-shadow:0 0 0 3px rgba(119,214,255,.09)}
.stageBtn.done{border-color:rgba(114,241,184,.7)}
#simCanvas{
  width:100%;height:100%;min-height:300px;display:block;touch-action:none;
  border-radius:0 0 var(--radius) var(--radius);
  background:radial-gradient(circle at 50% 10%, rgba(119,214,255,.06), transparent 28%), #050d18;
}
.side{display:grid;grid-template-rows:auto auto auto auto 1fr;gap:12px;min-height:0}
.stats,.controls,.formula,.assumptions,.feedback{padding:12px 14px}
.statsGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
  padding:10px;border-radius:14px;text-align:center;
  border:1px solid rgba(255,255,255,.05)
}
.stat .label{display:block;color:var(--muted);font-size:.8rem}
.stat .value{display:block;font-size:1.1rem;font-weight:700;margin-top:4px}
.controls h3,.formula h3,.assumptions h3,.feedback h3{margin:0 0 10px;font-size:.96rem}
.controlGroup{display:none}
.controlGroup.active{display:block}
.controlLine{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin:10px 0}
.controlLine label{font-size:.9rem}
.readout{font-variant-numeric:tabular-nums;color:var(--accent2);font-weight:700}
select,button,.toolBtn{
  background:#10213f;color:var(--ink);padding:10px 12px;cursor:pointer;
  transition:transform .16s ease, box-shadow .16s ease, filter .16s ease;
}
button:hover,.toolBtn:hover{transform:translateY(-1px)}
button:disabled{opacity:.48;cursor:not-allowed;transform:none !important}
.buttonRow{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.primary{background:linear-gradient(180deg,#1f8cff,#0868d6)}
.success{background:linear-gradient(180deg,#28b67a,#12945e)}
.warn{background:linear-gradient(180deg,#f0ad2e,#d18300)}
.danger{background:linear-gradient(180deg,#ff6b6b,#d94b4b)}
.formulaBox,.assumptionBox,.feedbackBox{
  white-space:pre-line;line-height:1.42;font-size:.92rem
}
.feedbackBox .ok{color:var(--good)}
.feedbackBox .bad{color:var(--bad)}
.feedbackBox .warnText{color:var(--warn)}
.joke{
  margin-top:10px;padding:10px;border-radius:12px;
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  color:var(--muted);font-size:.88rem;border:1px solid rgba(255,255,255,.06)
}
.modal{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(3,8,16,.82);backdrop-filter:blur(8px);padding:18px;z-index:30
}
.modalCard{
  width:min(920px,100%);max-height:95vh;overflow:auto;padding:18px 18px 16px;
  background:linear-gradient(180deg,rgba(10,18,34,.98),rgba(15,28,53,.96));
  border:1px solid rgba(255,255,255,.08);border-radius:24px;box-shadow:var(--shadow)
}
.modal h2{margin:0 0 8px}
.modal p{color:var(--ink);line-height:1.45}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pill{
  display:inline-block;padding:6px 10px;border-radius:999px;
  background:rgba(119,214,255,.12);color:var(--accent);font-size:.85rem;margin-right:8px;margin-bottom:8px
}
.kv{
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
  padding:12px;border-radius:16px;border:1px solid rgba(255,255,255,.05)
}
.kv strong{display:block;margin-bottom:4px}
.endStats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}
.endBox{
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
  padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.05)
}
.footerLine{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.small{font-size:.86rem;color:var(--muted)}
input[type="range"]{
  -webkit-appearance:none;appearance:none;width:100%;height:10px;outline:none;
  background:linear-gradient(90deg, rgba(119,214,255,.24), rgba(255,209,102,.26));
  border-radius:999px
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #fff, #aef1ff 40%, #5ea5ff 100%);
  border:2px solid rgba(255,255,255,.85);box-shadow:0 0 18px rgba(119,214,255,.35)
}
input[type="range"]::-moz-range-thumb{
  width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #fff, #aef1ff 40%, #5ea5ff 100%);
  border:2px solid rgba(255,255,255,.85);box-shadow:0 0 18px rgba(119,214,255,.35)
}

@keyframes pulseGlow{
  0%,100%{transform:scale(1);opacity:.75}
  50%{transform:scale(1.06);opacity:1}
}
@keyframes driftFloat{
  0%{transform:translateY(0) translateX(0)}
  50%{transform:translateY(-10px) translateX(8px)}
  100%{transform:translateY(0) translateX(0)}
}
@keyframes scanMove{
  0%{transform:translateY(-30%)}
  100%{transform:translateY(30%)}
}
.cinematicCard{
  position:relative;
  overflow:hidden;
  padding:0;
  min-height:430px;
  background:
    radial-gradient(circle at 18% 18%, rgba(255,90,90,.18), transparent 28%),
    radial-gradient(circle at 80% 24%, rgba(119,214,255,.16), transparent 22%),
    linear-gradient(180deg, rgba(5,10,22,.98), rgba(11,19,34,.98));
}
.cinematicBackdrop{
  position:absolute; inset:0; overflow:hidden;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,94,98,.20), transparent 28%),
    radial-gradient(circle at 78% 26%, rgba(119,214,255,.14), transparent 22%),
    radial-gradient(circle at 50% 85%, rgba(255,209,102,.10), transparent 28%);
}
.cinematicBackdrop::after{
  content:"";
  position:absolute; inset:-30%;
  background:repeating-linear-gradient(
    180deg,
    rgba(255,255,255,.025) 0px,
    rgba(255,255,255,.025) 1px,
    transparent 1px,
    transparent 5px
  );
  mix-blend-mode:screen;
  animation:scanMove 7s linear infinite;
}
.orb{
  position:absolute; border-radius:50%; filter:blur(8px); animation:pulseGlow 4.2s ease-in-out infinite;
}
.orb1{width:180px;height:180px;left:-30px;top:-20px;background:rgba(255,106,106,.26)}
.orb2{width:220px;height:220px;right:-40px;top:30px;background:rgba(119,214,255,.18);animation-delay:.8s}
.orb3{width:260px;height:260px;left:35%;bottom:-130px;background:rgba(255,209,102,.12);animation:driftFloat 9s ease-in-out infinite}
.cinematicContent{position:relative;z-index:2;padding:28px 26px 20px}
.briefTag{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06); color:var(--accent2);
  letter-spacing:.12em; text-transform:uppercase; font-size:.78rem;
}
.briefSceneCounter{
  margin-top:16px; color:var(--muted); letter-spacing:.18em; text-transform:uppercase; font-size:.77rem;
}
.briefHeadline{
  margin:10px 0 10px; font-size:clamp(1.55rem,2.8vw,2.35rem); line-height:1.04;
  max-width:760px;
}
.briefBody{
  max-width:760px; font-size:1.04rem; line-height:1.55; color:#eff7ff;
}
.briefMetaGrid{
  display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:18px 0 14px;
}
.alertLine{
  padding:12px 14px; border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.08);
}
.alertLine strong{display:block;margin-bottom:6px;color:var(--accent)}
.progressTrack{
  width:100%; height:10px; border-radius:999px; overflow:hidden;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.06);
}
.progressBar{
  height:100%; width:0%;
  background:linear-gradient(90deg, #ff6b6b, #ffd166 55%, #72f1b8);
  box-shadow:0 0 18px rgba(119,214,255,.25);
  transition:width .32s ease;
}
.bossBadge{
  display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;
  background:rgba(255,107,107,.10); color:#ffd9d9; border:1px solid rgba(255,107,107,.22);
  font-size:.82rem;
}
@media (max-width: 760px){
  .briefMetaGrid{grid-template-columns:1fr}
}


.toastLayer{
  position:fixed; right:16px; top:88px; z-index:40; display:flex; flex-direction:column; gap:10px; pointer-events:none;
}
.toast{
  min-width:240px; max-width:320px; padding:12px 14px; border-radius:16px;
  background:linear-gradient(180deg, rgba(13,26,49,.96), rgba(17,34,64,.92));
  border:1px solid rgba(255,255,255,.12); box-shadow:0 14px 26px rgba(0,0,0,.35);
  transform:translateX(0); opacity:0; animation:toastIn .24s ease-out forwards;
}
.toast.out{animation:toastOut .28s ease-in forwards}
.toastTitle{font-weight:800; color:var(--accent2); margin-bottom:4px}
.toastBody{font-size:.9rem; color:var(--ink); line-height:1.35}
.crewComm{
  position:fixed; left:16px; bottom:16px; z-index:35; width:min(420px, calc(100vw - 32px));
  display:flex; gap:12px; align-items:flex-start; padding:12px 14px; border-radius:18px;
  background:linear-gradient(180deg, rgba(10,19,38,.95), rgba(12,26,51,.90));
  border:1px solid rgba(255,255,255,.11); box-shadow:0 14px 28px rgba(0,0,0,.38);
}
.crewComm.good{box-shadow:0 0 0 1px rgba(114,241,184,.18),0 14px 28px rgba(0,0,0,.38)}
.crewComm.bad{box-shadow:0 0 0 1px rgba(255,107,107,.18),0 14px 28px rgba(0,0,0,.38)}
.crewAvatar{
  width:46px; height:46px; border-radius:50%; display:grid; place-items:center;
  background:radial-gradient(circle at 30% 30%, #fff, #b5f5ff 36%, #4e82ff 100%);
  color:#07111f; font-weight:900; letter-spacing:.03em; flex:0 0 auto;
}
.crewName{font-weight:800; color:var(--accent); margin-bottom:4px}
.crewText{font-size:.92rem; line-height:1.38; color:var(--ink)}
.comboChip{
  padding:8px 12px; border-radius:999px; font-weight:800; letter-spacing:.02em;
  background:linear-gradient(180deg, rgba(255,139,216,.16), rgba(255,139,216,.08));
  border:1px solid rgba(255,139,216,.22); color:#ffd7f3; min-width:116px; text-align:center;
}
.comboChip.hot{
  animation:pulseGlow 1.1s ease-in-out infinite;
  box-shadow:0 0 18px rgba(255,139,216,.18);
}
.achievementsWall{
  display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;
}
.achBadge{
  padding:8px 10px; border-radius:999px; background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.09); color:var(--ink); font-size:.86rem;
}
.arcadeTag{
  position:absolute; right:18px; top:18px; padding:8px 12px; border-radius:999px;
  background:rgba(255,139,216,.12); border:1px solid rgba(255,139,216,.22); color:#ffe7f9;
  font-weight:900; letter-spacing:.04em;
}
@keyframes toastIn{
  from{opacity:0; transform:translateX(22px) scale(.98)}
  to{opacity:1; transform:translateX(0) scale(1)}
}
@keyframes toastOut{
  from{opacity:1; transform:translateX(0) scale(1)}
  to{opacity:0; transform:translateX(26px) scale(.98)}
}



.roundGoalPanel{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin:12px 0 10px;
}
.goalCard{
  padding:10px 12px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.10);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.goalLabel{
  color:var(--muted);
  font-size:.74rem;
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-bottom:6px;
}
.goalValue{
  color:var(--ink);
  line-height:1.35;
  font-size:.95rem;
  font-weight:700;
}
.missionProgressWrap{
  padding:0 14px 10px;
}
.missionProgressTrack{
  width:100%;
  height:12px;
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
}
.missionProgressBar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, #4ecdc4, #77d6ff 40%, #ffd166 78%, #72f1b8);
  box-shadow:0 0 18px rgba(119,214,255,.25);
  transition:width .35s ease;
}
.missionProgressText{
  margin-top:6px;
  color:var(--muted);
  font-size:.84rem;
}
.clearCard{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 15% 20%, rgba(119,214,255,.12), transparent 30%),
    radial-gradient(circle at 84% 16%, rgba(255,209,102,.12), transparent 24%),
    linear-gradient(180deg,rgba(10,18,34,.98),rgba(15,28,53,.96));
}
.clearRibbon{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(114,241,184,.25);
  background:rgba(114,241,184,.10);
  color:#dfffee;
  font-weight:900;
  letter-spacing:.10em;
  text-transform:uppercase;
}
.clearStats{grid-template-columns:repeat(3,1fr)}
@media (max-width: 760px){
  .roundGoalPanel{grid-template-columns:1fr}
  .clearStats{grid-template-columns:1fr}
}


/* === SCREEN SHAKE === */
@keyframes shakeHard{
  0%,100%{transform:translate(0,0) rotate(0)}
  10%{transform:translate(-6px,3px) rotate(-.4deg)}
  20%{transform:translate(5px,-4px) rotate(.3deg)}
  30%{transform:translate(-4px,5px) rotate(-.2deg)}
  40%{transform:translate(6px,-3px) rotate(.4deg)}
  50%{transform:translate(-3px,4px) rotate(-.3deg)}
  60%{transform:translate(4px,-5px) rotate(.2deg)}
  70%{transform:translate(-5px,3px) rotate(-.4deg)}
  80%{transform:translate(3px,-4px) rotate(.3deg)}
  90%{transform:translate(-4px,5px) rotate(-.2deg)}
}
@keyframes shakeLight{
  0%,100%{transform:translate(0,0)}
  25%{transform:translate(-2px,1px)}
  50%{transform:translate(2px,-1px)}
  75%{transform:translate(-1px,2px)}
}
@keyframes celebratePop{
  0%{transform:scale(0) rotate(-30deg);opacity:0}
  50%{transform:scale(1.15) rotate(8deg);opacity:1}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 8px rgba(114,241,184,.2)}
  50%{box-shadow:0 0 22px rgba(114,241,184,.5), 0 0 44px rgba(114,241,184,.15)}
}
/* === VICTORY CELEBRATION === */
@keyframes confettiFall{
  0%{transform:translateY(-10vh) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0.3}
}
@keyframes rocketLaunch{
  0%{transform:translateY(0) scale(1);opacity:1}
  30%{transform:translateY(-10px) scale(1.05);opacity:1}
  100%{transform:translateY(-120vh) scale(0.3);opacity:0}
}
@keyframes victoryPulse{
  0%{transform:scale(1);text-shadow:0 0 20px rgba(255,209,102,.4)}
  50%{transform:scale(1.08);text-shadow:0 0 40px rgba(255,209,102,.7), 0 0 80px rgba(114,241,184,.3)}
  100%{transform:scale(1);text-shadow:0 0 20px rgba(255,209,102,.4)}
}
@keyframes medalBounce{
  0%{transform:scale(0) rotate(-180deg)}
  60%{transform:scale(1.3) rotate(10deg)}
  80%{transform:scale(0.95) rotate(-5deg)}
  100%{transform:scale(1) rotate(0deg)}
}
@keyframes fadeSlideUp{
  0%{opacity:0;transform:translateY(30px)}
  100%{opacity:1;transform:translateY(0)}
}
.victoryOverlay{
  position:fixed;inset:0;z-index:50;pointer-events:none;overflow:hidden;
}
.confettiPiece{
  position:absolute;top:-20px;width:10px;height:10px;border-radius:2px;
  animation:confettiFall linear forwards;
}
.rocketEmoji{
  position:fixed;bottom:20%;left:50%;transform:translateX(-50%);
  font-size:4rem;z-index:51;pointer-events:none;
  animation:rocketLaunch 2.5s cubic-bezier(.2,.8,.3,1) forwards;
}
.victoryMedal{
  display:inline-block;font-size:3.5rem;
  animation:medalBounce .8s cubic-bezier(.34,1.56,.64,1) forwards;
}
.victoryTitle{
  animation:victoryPulse 1.5s ease-in-out infinite;
}
.modalCard.victoryCard{
  animation:fadeSlideUp .6s ease-out forwards;
  border:1px solid rgba(255,209,102,.25);
  box-shadow:0 0 60px rgba(255,209,102,.12), 0 0 120px rgba(114,241,184,.08), var(--shadow);
}
.shake-hard{animation:shakeHard .45s ease-out}
.shake-light{animation:shakeLight .3s ease-out}
.celebrate{animation:celebratePop .5s cubic-bezier(.34,1.56,.64,1)}
.glow-success{animation:glowPulse 1.2s ease-in-out 3}

/* === ENERGY BAR (Stage 2 live feedback) === */
.energyBarWrap{
  margin:10px 0 6px;padding:8px 10px;border-radius:14px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
}
.energyBarLabel{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:5px}
.energyBarTrack{width:100%;height:14px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.06);position:relative}
.energyBarFill{height:100%;border-radius:999px;transition:width .25s ease, background .25s ease}
.energyBarThreshold{position:absolute;top:0;height:100%;width:2px;background:rgba(255,255,255,.85);z-index:2}
.energyBarThresholdLabel{position:absolute;top:-16px;font-size:.68rem;color:var(--accent2);white-space:nowrap;transform:translateX(-50%)}

/* === SOLAR FLARE TIMER (atmosphere) === */
.flareTimer{
  display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:14px;
  background:linear-gradient(90deg,rgba(255,107,107,.08),rgba(255,183,3,.06));
  border:1px solid rgba(255,107,107,.15);margin-top:8px;
}
.flareDot{width:8px;height:8px;border-radius:50%;background:#ff6b6b;animation:pulseGlow 1.2s ease-in-out infinite}
.flareText{font-size:.82rem;color:var(--warn);font-weight:700}
.flareBar{flex:1;height:6px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden}
.flareFill{height:100%;background:linear-gradient(90deg,#72f1b8,#ffd166 60%,#ff6b6b);transition:width 1s linear}

/* === PROGRESSIVE HINT DISPLAY === */
.hintTier{
  padding:10px 12px;margin:6px 0;border-radius:12px;
  background:linear-gradient(180deg,rgba(255,183,3,.08),rgba(255,183,3,.03));
  border-left:3px solid var(--warn);font-size:.88rem;line-height:1.4;
}
.hintTier .tierLabel{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--warn);margin-bottom:4px;font-weight:800}

@media (max-height: 900px){
  body{overflow:auto}
  .app{min-height:100vh;height:auto}
  .layout{align-items:start}
}
@media (max-width: 980px){
  body{overflow:auto}
  .layout{grid-template-columns:1fr;padding:8px}
  .side{grid-template-rows:auto auto auto auto auto}
  .statsGrid,.endStats{grid-template-columns:repeat(2,1fr)}
  #simCanvas{min-height:280px;max-height:50vh}
  .canvasTop{padding:8px 10px 6px}
  .canvasTop h2{font-size:.92rem}
  .canvasTop .mission{font-size:.88rem}
  .hudChips{gap:5px}
  .hudChip{padding:5px 8px;font-size:.78rem}
  .roundGoalPanel{grid-template-columns:1fr;gap:6px}
  .goalCard{padding:7px 10px}
  .stageNav{gap:5px}
  .stageBtn{padding:6px 8px;font-size:.82rem}
  .controlLine{grid-template-columns:1fr auto;gap:6px;margin:6px 0}
  .controlLine label{font-size:.82rem}
  .buttonRow{gap:5px}
  .buttonRow button{padding:8px 10px;font-size:.84rem;min-height:38px}
  header h1{font-size:1rem}
  header .sub{font-size:.82rem;display:none}
  .statsGrid{gap:6px}
  .stat{padding:7px}
  .stat .label{font-size:.72rem}
  .stat .value{font-size:.95rem}
  .formulaBox,.assumptionBox,.feedbackBox{font-size:.84rem}
  .modalCard{padding:14px}
  .modal h2{font-size:1.2rem}
  .briefHeadline{font-size:1.3rem !important}
  .grid2{grid-template-columns:1fr;gap:8px}
  .endStats{grid-template-columns:1fr 1fr}
  .crewComm{width:calc(100vw - 24px);left:12px;bottom:12px;padding:10px}
  .toastLayer{right:12px;top:70px}
  .toast{min-width:200px;max-width:280px;padding:10px 12px}
  .energyBarWrap{margin:6px 0 4px;padding:6px 8px}
  .flareTimer{padding:6px 10px;margin-top:6px}
}
@media (max-width: 420px){
  .layout{padding:4px}
  .statsGrid{grid-template-columns:1fr 1fr}
  .headerTools{gap:4px}
  .stageChip{display:none}
  .comboChip{font-size:.76rem;padding:6px 8px}
  .missionProgressWrap{padding:0 8px 4px}
  .stageNav{flex-wrap:nowrap;overflow-x:auto}
  .stageBtn{white-space:nowrap;font-size:.76rem;padding:5px 7px}
}

.stageIntroCard{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 18% 16%, rgba(255,139,216,.16), transparent 26%),
    radial-gradient(circle at 84% 12%, rgba(119,214,255,.14), transparent 24%),

}

.bossStatCard{

.stageIntroPulse{

@media (max-width: 820px){
  .stageIntroGrid{grid-template-columns:1fr}

<body>

<div id="game" class="app hidden">
  <header class="card">
    <div class="headerRow">
      <div>
        <h1 id="headerTitle"></h1>
        <div class="sub" id="headerSub"></div>
      </div>
      <div class="headerTools">

        <div class="comboChip" id="comboChip"></div>
        <button id="soundBtn" class="toolBtn"></button>
      </div>
    </div>
  </header>
  <div class="missionProgressWrap">
    <div class="missionProgressTrack"><div id="missionProgressBar" class="missionProgressBar"></div></div>
    <div id="missionProgressText" class="missionProgressText"></div>
  </div>
  <main class="layout">
    <section class="card canvasWrap">
      <div class="canvasTop">
        <h2 id="stageTitle"></h2>
        <div class="mission" id="missionBrief"></div>
        <div class="mini" id="missionMini"></div>
        <div class="hudChips">
          <div class="hudChip" id="targetChip"></div>
          <div class="hudChip" id="conflictChip"></div>
        </div>
        <div class="flareTimer" id="flareTimer">
          <div class="flareDot"></div>
          <span class="flareText" id="flareText">Solar flare ETA</span>
          <div class="flareBar"><div class="flareFill" id="flareFill" style="width:100%"></div></div>
        </div>
        <div class="roundGoalPanel">
          <div class="goalCard">
            <div class="goalLabel" id="goalNowLabel"></div>
            <div class="goalValue" id="goalNow"></div>
          </div>
          <div class="goalCard">
            <div class="goalLabel" id="goalDoLabel"></div>
            <div class="goalValue" id="goalDo"></div>
          </div>
          <div class="goalCard">
            <div class="goalLabel" id="goalPassLabel"></div>
            <div class="goalValue" id="goalPass"></div>
          </div>
        </div>
        <div class="stageNav">
          <button id="stageBtn1" class="stageBtn"></button>
          <button id="stageBtn2" class="stageBtn" disabled></button>
          <button id="stageBtn3" class="stageBtn" disabled></button>
          <button id="stageBtn4" class="stageBtn hidden" disabled></button>
        </div>
      </div>
      <canvas id="simCanvas"></canvas>
    </section>

    <aside class="side">
      <section class="card stats">
        <div class="statsGrid">
          <div class="stat"><span class="label" id="attemptsLabel"></span><span class="value" id="attemptsVal">0</span></div>
          <div class="stat"><span class="label" id="scoreLabel"></span><span class="value" id="scoreVal">100</span></div>
          <div class="stat"><span class="label" id="timeLabel"></span><span class="value" id="timeVal">00:00</span></div>
          <div class="stat"><span class="label" id="medalLabel"></span><span class="value" id="medalVal">—</span></div>
        </div>
      </section>

      <section class="card controls">
        <h3 id="controlsTitle"></h3>

        <div id="controls1" class="controlGroup">
          <div class="controlLine">
            <label id="selectedPeakLabel"></label>
            <span class="readout" id="selectedPeakVal">—</span>
          </div>
          <div class="controlLine">
            <label id="tempLabel" for="tempRange"></label>
            <span class="readout" id="tempVal"></span>
          </div>
          <input id="tempRange" type="range" min="3000" max="9000" step="10" value="5600" />
        </div>

        <div id="controls2" class="controlGroup">
          <!-- GIVEN: what the mission tells you -->
          <div id="givenHeader" style="margin:0 0 6px;padding:6px 10px;border-radius:10px;background:rgba(255,255,255,.05);border-left:3px solid var(--muted);font-size:.80rem;font-weight:700;color:var(--muted)"></div>
          <div class="controlLine">
            <label id="materialLabel"></label>
            <span class="readout" id="materialVal"></span>
          </div>
          <div class="controlLine">
            <label id="workLabel"></label>
            <span class="readout" id="workVal"></span>
          </div>

          <!-- TARGETS: what you must achieve -->
          <div id="targetHeader" style="margin:10px 0 6px;padding:6px 10px;border-radius:10px;background:rgba(255,209,102,.10);border-left:3px solid var(--accent2);font-size:.80rem;font-weight:700;color:var(--accent2)"></div>
          <div class="controlLine" style="background:rgba(255,209,102,.06);border-radius:8px;padding:4px 8px">
            <label id="targetKLabel" style="color:var(--accent2)"></label>
            <span class="readout" id="targetKVal" style="color:var(--accent2)"></span>
          </div>
          <div class="controlLine" style="background:rgba(255,209,102,.06);border-radius:8px;padding:4px 8px">
            <label id="targetILabel" style="color:var(--accent2)"></label>
            <span class="readout" id="targetIVal" style="color:var(--accent2)"></span>
          </div>

          <!-- YOUR CONTROLS: adjust these based on your calculations -->
          <div id="controlHeader" style="margin:10px 0 6px;padding:6px 10px;border-radius:10px;background:rgba(119,214,255,.08);border-left:3px solid var(--accent);font-size:.80rem;font-weight:700;color:var(--accent)"></div>

          <!-- CLASSICAL TRAP BANNER (visible before trap is broken) -->
          <div id="classicalTrapBanner" style="margin:6px 0;padding:10px 12px;border-radius:12px;background:linear-gradient(180deg,rgba(255,107,107,.12),rgba(255,183,3,.08));border:1px solid rgba(255,107,107,.25);display:none">
            <div id="trapTitle" style="font-weight:800;color:var(--warn);margin-bottom:4px;font-size:.88rem"></div>
            <div id="trapBody" style="font-size:.82rem;line-height:1.40;color:var(--ink)"></div>
          </div>

          <div class="controlLine">
            <label id="lambdaLabel" for="lambdaRange"></label>
            <span class="readout" id="lambdaVal"></span>
          </div>
          <input id="lambdaRange" type="range" min="200" max="700" step="1" value="450" />
          <!-- Lock icon overlay for λ during classical trap -->
          <div id="lambdaLock" style="display:none;margin:-6px 0 4px;padding:4px 10px;border-radius:8px;background:rgba(255,107,107,.10);border:1px solid rgba(255,107,107,.20);font-size:.78rem;color:var(--bad)"></div>
          <!-- Energy bar: helps relate nm ↔ eV visually (neutral color, no pass/fail) -->
          <div class="energyBarWrap" id="energyBarWrap">
            <div class="energyBarLabel">
              <span id="energyBarLeftLabel">E_photon</span>
              <span id="energyBarRightLabel">0 eV</span>

            <div class="energyBarTrack">
              <div class="energyBarFill" id="energyBarFill" style="width:0%;background:#77d6ff"></div>
              <div class="energyBarThreshold" id="energyBarThreshold" style="left:50%">
                <span class="energyBarThresholdLabel" id="energyBarThresholdLabel">φ</span>
              </div>
            </div>
          </div>
          <div class="controlLine">
            <label id="intensityLabel" for="intensityRange"></label>
            <span class="readout" id="intensityVal"></span>
          </div>
          <input id="intensityRange" type="range" min="10" max="90" step="1" value="50" />
          <!-- a.u. explanation -->
          <div id="auExplain" style="margin:4px 0 6px;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);font-size:.76rem;line-height:1.40;color:var(--muted)"></div>

          <!-- RESULTS: hidden until Check is pressed -->
          <div id="resultsPanel" class="hidden" style="margin:10px 0 4px;padding:10px;border-radius:12px;background:rgba(114,241,184,.06);border:1px solid rgba(114,241,184,.15)">

              <span class="readout" id="derivedKVal">—</span>

            <div class="controlLine">
              <label id="derivedILabel"></label>
              <span class="readout" id="derivedIVal">—</span>
            </div>
          </div>

          <!-- FORMULA REMINDER & CAUSAL CHAIN -->
          <div id="causalChain" style="margin:10px 0 4px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:.80rem;line-height:1.45;color:var(--muted)"></div>

        <div id="controls3" class="controlGroup">

            <label id="gateLabel"></label>
            <span class="readout" id="gateVal"></span>
          </div>
          <div class="controlLine">
            <label id="targetSpotLabel"></label>
            <span class="readout" id="targetSpotVal"></span>
          </div>
          <div class="controlLine">
            <label id="slitLabel" for="slitRange"></label>

          </div>

          <!-- Classical vs Quantum toggle -->
          <div style="margin:8px 0;display:flex;gap:6px;flex-wrap:wrap">
            <button id="viewQuantumBtn" class="primary" style="flex:1;min-width:100px;font-size:.80rem;padding:8px 10px;border-radius:10px"></button>
            <button id="viewClassicalBtn" style="flex:1;min-width:100px;font-size:.80rem;padding:8px 10px;border-radius:10px;background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.30);color:#ffd9d9"></button>
          </div>
          <div id="viewModeExplain" style="font-size:.76rem;line-height:1.35;color:var(--muted);margin-bottom:6px"></div>
          <div class="controlLine">
            <label id="dbLabel"></label>
            <span class="readout" id="dbVal">—</span>
          </div>
          <div class="controlLine">
            <label id="spotLabel"></label>
            <span class="readout" id="spotVal">—</span>
          </div>
        </div>

        <div id="controls4" class="controlGroup">
          <div class="controlLine">
            <label id="incidentLabel"></label>
            <span class="readout" id="incidentVal"></span>
          </div>
          <input id="incidentRange" type="range" min="18" max="80" step="0.1" value="38" />
          <div class="controlLine">
            <label id="angleLabel"></label>
            <span class="readout" id="angleVal"></span>
          </div>
          <input id="angleRange" type="range" min="20" max="170" step="1" value="90" />
          <div class="controlLine">
            <label id="scatterTargetLabel"></label>
            <span class="readout" id="scatterTargetVal"></span>
          </div>
          <div class="controlLine">
            <label id="scatteredLabel"></label>
            <span class="readout" id="scatteredVal"></span>
          </div>
          <div class="controlLine">
            <label id="recoilTargetLabel"></label>
            <span class="readout" id="recoilTargetVal"></span>
          </div>
          <div class="controlLine">
            <label id="recoilLabel"></label>
            <span class="readout" id="recoilVal"></span>
          </div>
        </div>

        <div class="buttonRow">
          <button id="computeBtn" class="primary"></button>
          <button id="pauseBtn"></button>
          <button id="hintBtn" class="warn"></button>
          <button id="resetBtn" class="danger"></button>
          <button id="prevBtn"></button>
          <button id="nextBtn"></button>
          <button id="launchBtn" class="success" disabled></button>
        </div>
      </section>

      <section class="card formula">
        <h3 id="formulaTitle"></h3>
        <div class="formulaBox" id="formulaBox"></div>
      </section>

      <section class="card assumptions">
        <h3 id="assTitle"></h3>
        <div class="assumptionBox" id="assumptionBox"></div>
      </section>

      <section class="card feedback">
        <h3 id="feedbackTitle"></h3>
        <div class="feedbackBox" id="feedbackBox"></div>
        <div class="joke" id="jokeBox"></div>
      </section>
    </aside>
  </main>
</div>

<div id="endModal" class="modal hidden">
  <div class="modalCard">
    <h2 id="endTitle"></h2>
    <div class="endStats">
      <div class="endBox"><strong id="endMedalTitle"></strong><div id="endMedal"></div></div>
      <div class="endBox"><strong id="endScoreTitle"></strong><div id="endScore"></div></div>
      <div class="endBox"><strong id="endAttemptsTitle"></strong><div id="endAttempts"></div></div>
      <div class="endBox"><strong id="endErrorTitle"></strong><div id="endError"></div></div>
    </div>
    <div class="grid2">
      <div class="endBox">
        <strong id="theoryTitle"></strong>
        <div id="theoryBox"></div>

function actionAnchor(stage, w, h){
  if(stage === 1){
    const peakNm = state.selectedPeakNm ?? state.mission?.stage1?.truePeakNm ?? 700;
    const x = (peakNm - 200) / 2000;
    return { x: clamp(0.08 + x * 0.84, 0.12, 0.88) * w, y: h * 0.34 };
  }
  if(stage === 2) return { x: w * 0.80, y: h * 0.44 };
  if(stage === 3) return { x: w * 0.78, y: h * 0.50 };
  if(stage === 4) return { x: w * 0.46, y: h * 0.52 };
  return { x: w * 0.5, y: h * 0.5 };
}
function drawArcadeAction(ctx, w, h){
  const fx = state.fx.action;
  if(!fx || fx.timer <= 0.025) return;
  const dpr = window.devicePixelRatio || 1;
  const p = fx.timer;
  const anchor = actionAnchor(fx.stage, w, h);
  const x = anchor.x, y = anchor.y;
  const colors = fx.kind === "success"
    ? { rgb:"114,241,184", panel:"rgba(114,241,184,.18)", line:"rgba(114,241,184,.95)" }
    : fx.kind === "blocked"
      ? { rgb:"255,183,3", panel:"rgba(255,183,3,.18)", line:"rgba(255,183,3,.95)" }
      : { rgb:"255,107,107", panel:"rgba(255,107,107,.18)", line:"rgba(255,107,107,.95)" };

  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for(let i=0;i<3;i++){
    const ring = (1 - p + i * 0.14) * 150 * dpr;
    ctx.strokeStyle = `rgba(${colors.rgb},${Math.max(0, 0.34 - i*0.08) * p})`;
    ctx.lineWidth = (4 - i) * dpr;
    ctx.beginPath();
    ctx.arc(x, y, Math.max(12*dpr, ring), 0, Math.PI*2);
    ctx.stroke();
  }

  const streaks = fx.kind === "success" ? 18 : 12;
  for(let i=0;i<streaks;i++){
    const ang = (Math.PI*2*i/streaks) + (1-p)*1.7;
    const inner = 24*dpr + i%3 * 8*dpr;
    const outer = inner + (40 + 90*(1-p)) * dpr;
    ctx.strokeStyle = `rgba(${colors.rgb},${0.20 + 0.45*p})`;
    ctx.lineWidth = (fx.kind === "success" ? 2.6 : 2.1) * dpr;
    ctx.beginPath();
    ctx.moveTo(x + Math.cos(ang) * inner, y + Math.sin(ang) * inner);
    ctx.lineTo(x + Math.cos(ang) * outer, y + Math.sin(ang) * outer);
    ctx.stroke();
  }

  if(fx.kind === "success"){
    for(let i=0;i<14;i++){
      const ang = (Math.PI*2*i/14) + (1-p)*3.6;
      const r = (70 + 80*(1-p)) * dpr;
      ctx.fillStyle = `rgba(255,255,255,${0.18 + 0.55*p})`;
      ctx.beginPath();
      ctx.arc(x + Math.cos(ang) * r, y + Math.sin(ang) * r, (2 + (i%3)) * dpr, 0, Math.PI*2);
      ctx.fill();
    }
  }

  const panelW = Math.min(w * 0.58, 430 * dpr);
  const panelH = 54 * dpr;
  const panelX = (w - panelW) / 2;
  const panelY = 18 * dpr;
  ctx.fillStyle = colors.panel;
  roundedRect(ctx, panelX, panelY, panelW, panelH, 18*dpr);
  ctx.fill();
  ctx.strokeStyle = colors.line;
  ctx.lineWidth = 2*dpr;
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,.98)";
  ctx.textAlign = "center";
  ctx.font = `900 ${16*dpr}px sans-serif`;
  ctx.fillText(fx.text || "", panelX + panelW/2, panelY + 22*dpr);
  ctx.font = `800 ${12*dpr}px sans-serif`;
  ctx.fillStyle = fx.kind === "success" ? "rgba(255,255,255,.95)" : `rgba(${colors.rgb},.95)`;
  ctx.fillText(fx.kind === "success" ? tr("fxClear") : tr("fxRetry"), panelX + panelW/2, panelY + 40*dpr);
  ctx.textAlign = "left";
  ctx.restore();
}

function handleKey(e){
  if(state.stageIntro.active){
    const key = e.key.toLowerCase();
    if(key === "enter" || key === " "){
      e.preventDefault();
      closeStageIntro();
    }else if(key === "escape"){
      closeStageIntro();
    }
    return;
  }
  if(state.briefing.active){
    const key = e.key.toLowerCase();
    if(key === "enter" || key === " "){
      e.preventDefault();
      nextBriefing();
    }else if(key === "escape"){
      closeBriefing();
    }
    return;
  }
  if(!state.started) return;
  const key = e.key.toLowerCase();
  if(key === " " || key === "enter"){
    e.preventDefault();
    computeStage();
  }else if(key === "p"){
    togglePause();
  }else if(key === "r"){
    resetMissionState();
  }else if(key === "h"){
    giveHint();
  }
}

function missionByDifficulty(diff){
  const material = diff === "easy"
    ? { key:"matNa", phi:2.28 }
    : diff === "medium"
      ? { key:"matCa", phi:2.90 }
      : { key:"matZn", phi:4.31 };

  const T = diff === "easy" ? Math.round(rand(4500,6500)/10)*10 :
            diff === "medium" ? Math.round(rand(4000,7500)/10)*10 :
            Math.round(rand(3600,8200)/10)*10;

  const targetK = diff === "easy" ? rand(0.70,1.05) :
                  diff === "medium" ? rand(0.55,1.25) :
                  rand(0.45,1.50);

  const targetI = diff === "easy" ? Math.round(rand(35,65)) :
                  diff === "medium" ? Math.round(rand(30,72)) :
                  Math.round(rand(25,75));

  const targetLambda = 1240 / (material.phi + targetK);
  const L = diff === "easy" ? 0.85 : diff === "medium" ? 1.0 : 1.15;
  const targetSpot = diff === "easy" ? Math.round(rand(18,28)) :
                     diff === "medium" ? Math.round(rand(14,24)) :
                     Math.round(rand(10,20));

  const lambdaDbTarget = 1.227 / Math.sqrt(targetK);
  const aTarget = 2 * L * 1000 * lambdaDbTarget / targetSpot;
  const margin = diff === "easy" ? 1.20 : diff === "medium" ? 1.10 : 1.04;
  const gateMax = Math.round(aTarget * margin);
  const wavelengths = [];
  const spectrum = [];
  const truePeakNm = (C.b / T) * 1e9;

  for(let nm = 200; nm <= 2200; nm += 15){
    const m = nm * 1e-9;
    const x = (C.h * C.c) / (m * C.kB * T);
    let B = (2 * C.h * C.c * C.c) / (Math.pow(m,5) * (Math.exp(x) - 1));
    if(!Number.isFinite(B)){ B = 0; }
    wavelengths.push(nm);
    spectrum.push(B);
  }
  const maxB = Math.max(...spectrum);
  const noisy = spectrum.map(v => (v / maxB) * rand(0.93,1.07));

  let lambda0Pm = diff === "hard" ? rand(22,58) : rand(24,60);
  let thetaDeg = diff === "hard" ? rand(55,160) : rand(50,145);
  const lambdaCpm = 2.43;
  let scatteredPm = lambda0Pm + lambdaCpm * (1 - Math.cos(thetaDeg * Math.PI / 180));
  let recoilKeV = 1.239841984 * (1/(lambda0Pm/1000) - 1/(scatteredPm/1000));

  return {
    stage1: { T, truePeakNm, wavelengths, noisy },
    stage2: { material, targetK, targetI, targetLambda },
    stage3: { L, targetSpot, gateMax, aTarget },
    stage4: { lambda0Pm, thetaDeg, scatteredPm, recoilKeV, lambdaCpm }
  };
}

  state.classicalTrapAttempts = 0;
  state.fx.action = { stage:0, kind:"idle", timer:0, text:"" };
  resetStage2Viz();

  q("introModal").classList.add("hidden");
  q("game").classList.remove("hidden");
  q("endModal").classList.add("hidden");
  q("roundModal").classList.add("hidden");
  q("briefingModal").classList.add("hidden");
  state.briefing.active = false;

  q("tempRange").value = clamp(state.mission.stage1.T + (Math.random() < 0.5 ? -600 : 700), 3000, 9000);
  q("lambdaRange").value = clamp(Math.round(state.mission.stage2.targetLambda + rand(-70,70)), 200, 700);

  q("slitRange").max = Math.max(Number(q("slitRange").min)+10, state.mission.stage3.gateMax);
  q("slitRange").value = clamp(Math.round(state.mission.stage3.aTarget * rand(0.7,1.25)), Number(q("slitRange").min), Number(q("slitRange").max));

function goStage(n){
  if(!state.started) return;
  state.stage = clamp(n,1,stageMax());
  updateUI();
  if(!state.stageIntro.active){ showStageIntro(state.stage); }
}

function updateUI(){
  if(!state.started){ return; }

  q("stageTitle").textContent = stageName(state.stage);
  q("missionBrief").textContent = stageBrief(state.stage);
  q("missionMini").textContent = stageMini(state.stage);
  q("targetChip").innerHTML = "<strong>•</strong>" + stageTargetChip(state.stage);
  q("conflictChip").innerHTML = "<strong>•</strong>" + stageConflictChip(state.stage);
  q("goalNow").textContent = stageGoalNow(state.stage);
  q("goalDo").textContent = stageGoalDo(state.stage);
  q("goalPass").textContent = stageGoalPass(state.stage);
  q("stageChip").innerHTML = stageStatus(state.stage) + " · " + tr("stageChipText") + (showStage4() && state.stage === 4 ? " <span class='bossBadge'>Boss</span>" : "");
  const solvedCount = activeStages().filter(i => state.stageSolved[i]).length;
  q("missionProgressBar").style.width = (100 * solvedCount / stageMax()) + "%";
  q("missionProgressText").textContent = tr("missionProgressText").replace("{done}", solvedCount).replace("{total}", stageMax());

  q("controls1").classList.toggle("active", state.stage === 1);
  q("controls2").classList.toggle("active", state.stage === 2);
  q("controls3").classList.toggle("active", state.stage === 3);
  q("controls4").classList.toggle("active", state.stage === 4);

  // === CLASSICAL TRAP UI (Stage 2) ===
  const trapBanner = q("classicalTrapBanner");
  const lambdaLock = q("lambdaLock");
  const lambdaSlider = q("lambdaRange");
  if(trapBanner && lambdaLock && lambdaSlider){
    if(state.stage === 2 && !state.classicalTrapDone){
      // Lock λ well above threshold (so E < φ → no emission)
      const trappedLambda = clamp(Math.round(1240 / (state.mission.stage2.material.phi * 0.75)), 200, 700);
      lambdaSlider.value = trappedLambda;
      lambdaSlider.disabled = true;
      lambdaSlider.style.opacity = "0.35";
      trapBanner.style.display = "block";
      q("trapTitle").textContent = tr("trapTitle");
      q("trapBody").textContent = tr("trapBody");
      lambdaLock.style.display = "block";
      lambdaLock.textContent = tr("trapLock").replace("{val}", trappedLambda);
    } else {
      lambdaSlider.disabled = false;
      lambdaSlider.style.opacity = "1";
      trapBanner.style.display = "none";
      lambdaLock.style.display = "none";
    }
  }

  q("stageBtn4").classList.toggle("hidden", !showStage4());

  [1,2,3,4].forEach(i => {
    const btn = q("stageBtn"+i);
    if(!btn) return;
    btn.textContent = (state.stageSolved[i] ? "✓ " : "") + stageName(i);
    btn.classList.toggle("active", state.stage === i);
    btn.classList.toggle("done", state.stageSolved[i]);
  });

  q("stageBtn2").disabled = !state.stageSolved[1] && state.stage < 2;
  q("stageBtn3").disabled = !state.stageSolved[2];
  q("stageBtn4").disabled = !showStage4() || !state.stageSolved[3];
  q("prevBtn").disabled = state.stage === 1;
  q("nextBtn").disabled = state.stage === stageMax() || !state.stageSolved[state.stage];
  q("pauseBtn").textContent = state.paused ? tr("resume") : tr("pause");
  q("launchBtn").disabled = !canLaunch();
  q("soundBtn").textContent = state.audio.enabled ? tr("soundOn") : tr("soundOff");
  updateComboChip();
  renderCrewPanel();

  q("materialVal").textContent = tr(state.mission.stage2.material.key);
  q("workVal").textContent = fmtNum(state.mission.stage2.material.phi, 2) + " eV";

  // === STAGE 2: section headers, targets ===
  if(q("givenHeader")) q("givenHeader").textContent = tr("givenHeader");
  if(q("targetHeader")) q("targetHeader").textContent = tr("targetHeader");
  if(q("controlHeader")) q("controlHeader").textContent = tr("controlHeader");
  if(q("resultsHeader")) q("resultsHeader").textContent = tr("resultsHeader");
  if(q("targetKLabel")) q("targetKLabel").textContent = tr("targetKLabel");
  if(q("targetKVal")) q("targetKVal").textContent = fmtNum(state.mission.stage2.targetK, 2) + " eV";
  if(q("targetILabel")) q("targetILabel").textContent = tr("targetILabel");
  if(q("targetIVal")) q("targetIVal").textContent = fmtNum0(state.mission.stage2.targetI) + " a.u.";

  q("gateVal").textContent = fmtNum0(state.mission.stage3.gateMax) + " nm";
  q("targetSpotVal").textContent = fmtNum0(state.mission.stage3.targetSpot) + " mm";
  q("scatterTargetVal").textContent = fmtNum(state.mission.stage4.scatteredPm,1) + " pm";
  q("recoilTargetVal").textContent = fmtNum(state.mission.stage4.recoilKeV,2) + " keV";

  q("formulaBox").textContent = state.stage === 1 ? tr("form1") : state.stage === 2 ? tr("form2") : state.stage === 3 ? tr("form3") : tr("form4");
  q("assumptionBox").textContent = state.stage === 1 ? tr("ass1") : state.stage === 2 ? tr("ass2") : state.stage === 3 ? tr("ass3") : tr("ass4");

  q("attemptsVal").textContent = String(state.attempts);
  q("scoreVal").textContent = String(currentScore());
  q("timeVal").textContent = fmtTime(state.timeSec);
  q("medalVal").textContent = medalFor(avgBestError()).symbol;

  if(state.stage === 3) updateStage3ViewUI();
  updateReadouts();
  render();
}

function updateReadouts(){
  if(!state.started || !state.mission) return;
  q("tempVal").textContent = fmtNum0(Number(q("tempRange").value)) + " K";
  q("selectedPeakVal").textContent = state.selectedPeakNm ? fmtNum0(state.selectedPeakNm) + " nm" : "—";
  q("lambdaVal").textContent = fmtNum0(Number(q("lambdaRange").value)) + " nm";
  q("intensityVal").textContent = fmtNum0(Number(q("intensityRange").value)) + " a.u.";
  q("slitVal").textContent = fmtNum0(Number(q("slitRange").value)) + " nm";
  q("incidentVal").textContent = fmtNum(Number(q("incidentRange").value),1) + " pm";
  q("angleVal").textContent = fmtNum0(Number(q("angleRange").value)) + "°";

  const s2 = calcStage2();
  // DO NOT show computed Kmax and photocurrent in real-time!
  // Student must CALCULATE these from formulas, then press Check to verify.
  // Only show "?" to indicate they need to figure it out.
  if(!state.stage2ResultsRevealed){
    q("derivedKVal").textContent = "?";
    q("derivedIVal").textContent = "?";
  }

  // === ENERGY BAR UPDATE ===
  const energyBarFill = q("energyBarFill");
  const energyBarThreshold = q("energyBarThreshold");
  const energyBarRightLabel = q("energyBarRightLabel");
  const energyBarLeftLabel = q("energyBarLeftLabel");
  const energyBarThresholdLabel = q("energyBarThresholdLabel");
  if(energyBarFill && state.mission){
    const phi = state.mission.stage2.material.phi;
    const maxE = 8; // eV scale
    const Eph = s2.E;
    const fillPct = Math.min(100, (Eph / maxE) * 100);
    const threshPct = Math.min(100, (phi / maxE) * 100);
    energyBarFill.style.width = fillPct + "%";
    // NEUTRAL color — never reveals if above or below threshold
    energyBarFill.style.background = "linear-gradient(90deg, #77d6ff, #a8e0ff)";
    energyBarThreshold.style.left = threshPct + "%";
    energyBarThresholdLabel.textContent = "φ = " + fmtNum(phi,2) + " eV";
    // Show value only — no pass/fail indicator
    energyBarRightLabel.textContent = fmtNum(Eph,2) + " eV";
    energyBarRightLabel.style.color = "var(--accent2)";
    energyBarLeftLabel.textContent = tr("energyBarLeft");
  }

  // === CAUSAL CHAIN (always visible in Stage 2 controls) ===
  const chainEl = q("causalChain");
  if(chainEl && state.mission){
    chainEl.innerHTML = "<strong>" + tr("causalChainTitle") + "</strong><br>" +
      tr("causalChain1") + "<br>" +
      tr("causalChain2") + "<br>" +
      "<span style='color:var(--warn);font-weight:700'>" + tr("causalChainNote") + "</span>";
  }
  // === a.u. explanation ===
  const auEl = q("auExplain");
  if(auEl) auEl.textContent = tr("auExplain");

  // === FLARE TIMER UPDATE ===
  const flareMaxTime = state.difficulty === "easy" ? 600 : state.difficulty === "medium" ? 420 : 300;
  const flareRemaining = Math.max(0, flareMaxTime - state.timeSec);
  const flarePct = (flareRemaining / flareMaxTime) * 100;
  const flareFill = q("flareFill");
  const flareTextEl = q("flareText");
  if(flareFill){
    flareFill.style.width = flarePct + "%";
    const min = Math.floor(flareRemaining / 60);
    const sec = Math.floor(flareRemaining % 60);
    if(flareTextEl) flareTextEl.textContent = tr("flareText") + " " + pad2(min) + ":" + pad2(sec);
  }

  const s3 = calcStage3();
  q("dbVal").textContent = s3.lambdaDb ? fmtNum(s3.lambdaDb, 3) + " nm" : "—";
  q("spotVal").textContent = s3.spotMm ? fmtNum(s3.spotMm, 2) + " mm" : "—";

  const s4 = calcStage4();
  q("scatteredVal").textContent = fmtNum(s4.scatteredPm,1) + " pm";
  q("recoilVal").textContent = fmtNum(s4.recoilKeV,2) + " keV";

  refreshJokeBox();
}

// === SCREEN SHAKE UTILITY ===
function shakeCanvas(intensity){
  const canvas = q("simCanvas");
  if(!canvas) return;
  canvas.classList.remove("shake-hard","shake-light");
  void canvas.offsetWidth; // force reflow
  canvas.classList.add(intensity === "hard" ? "shake-hard" : "shake-light");
  setTimeout(()=> canvas.classList.remove("shake-hard","shake-light"), 500);
}
function celebrateElement(el){
  if(!el) return;
  el.classList.remove("celebrate","glow-success");
  void el.offsetWidth;
  el.classList.add("celebrate","glow-success");
  setTimeout(()=> el.classList.remove("celebrate","glow-success"), 4000);
}

function calcStage2(){
  const lambdaNm = Number(q("lambdaRange").value);
  const intensity = Number(q("intensityRange").value);
  const phi = state.mission.stage2.material.phi;
  const E = 1240 / lambdaNm;
  const K = Math.max(0, E - phi);
  const current = K > 0 ? intensity : 0;
  return { lambdaNm, intensity, phi, E, K, current };
}


function resetStage2Viz(){
  state.stage2Viz = {
    checked:false,
    emitted:false,
    success:false,
    current:0,
    lambdaNm:Number(q("lambdaRange") ? q("lambdaRange").value : 0),
    intensity:Number(q("intensityRange") ? q("intensityRange").value : 0),
    K:0,
    pulse:0,
    reason:"idle"
  };
  state.stage2ResultsRevealed = false;
  const rp = q("resultsPanel");
  if(rp) rp.classList.add("hidden");
}
function invalidateStage2Viz(){
  if(!state.stage2Viz) resetStage2Viz();
  state.stage2Viz.checked = false;
  state.stage2Viz.emitted = false;
  state.stage2Viz.success = false;
  state.stage2Viz.current = 0;
  state.stage2Viz.lambdaNm = Number(q("lambdaRange") ? q("lambdaRange").value : 0);
  state.stage2Viz.intensity = Number(q("intensityRange") ? q("intensityRange").value : 0);
  state.stage2Viz.K = 0;
  state.stage2Viz.pulse = 0;
  state.stage2Viz.reason = "pending";
  // Hide results — student must recalculate and press Check again
  state.stage2ResultsRevealed = false;
  const rp = q("resultsPanel");
  if(rp) rp.classList.add("hidden");
}
function commitStage2Viz(s2, success){
  state.stage2Viz = {
    checked:true,
    emitted:s2.K > 0,
    success:!!success,
    current:s2.current,
    lambdaNm:s2.lambdaNm,
    intensity:s2.intensity,
    K:s2.K,
    pulse:1,
    reason: success ? "success" : (s2.K > 0 ? "fail" : "blocked")
  };
}
function calcStage3(){
  const s2 = calcStage2();
  if(s2.K <= 0){ return { lambdaDb: 0, slitNm: Number(q("slitRange").value), spotMm: 0, reqSlitNm: Infinity }; }
  const lambdaDb = 1.227 / Math.sqrt(s2.K);
  const slitNm = Number(q("slitRange").value);
  const L = state.mission.stage3.L;
  const spotMm = 2 * L * 1000 * (lambdaDb / slitNm);
  const reqSlitNm = 2 * L * 1000 * lambdaDb / state.mission.stage3.targetSpot;
  return { lambdaDb, slitNm, spotMm, reqSlitNm };
}


function calcStage4(){
  const lambda0Pm = Number(q("incidentRange").value);
  const thetaDeg = Number(q("angleRange").value);
  const lambdaCpm = state.mission.stage4.lambdaCpm;
  const scatteredPm = lambda0Pm + lambdaCpm * (1 - Math.cos(thetaDeg * Math.PI / 180));
  const recoilKeV = 1.239841984 * (1/(lambda0Pm/1000) - 1/(scatteredPm/1000));
  return { lambda0Pm, thetaDeg, scatteredPm, recoilKeV };
}

function computeStage(){
  if(!state.started) return;
  state.attempts += 1;
  // Track per-stage attempts for first-try achievement
  if(!state.stageAttempts) state.stageAttempts = {};
  if(!state.stageAttempts[state.stage]) state.stageAttempts[state.stage] = 0;
  state.stageAttempts[state.stage] += 1;

  if(state.stage === 1) computeStage1();
  else if(state.stage === 2) computeStage2();
  else if(state.stage === 3) computeStage3();
  else computeStage4();

  updateUI();
}

function computeStage1(){
  const tolPeak = state.difficulty === "easy" ? 6 : state.difficulty === "medium" ? 4 : 2.5;
  const tolTemp = state.difficulty === "easy" ? 6 : state.difficulty === "medium" ? 4 : 2.5;
  if(state.selectedPeakNm === null){
    registerFailure();
    failTone();
    triggerStageAction("fail", tr("fxStage1Fail"));
    setFeedback("<span class='bad'>"+tr("noPeak")+"</span>");
    return;
  }
  const peakErr = Math.abs(state.selectedPeakNm - state.mission.stage1.truePeakNm) / state.mission.stage1.truePeakNm * 100;
  const tempErr = Math.abs(Number(q("tempRange").value) - state.mission.stage1.T) / state.mission.stage1.T * 100;
  const avg = (peakErr + tempErr) / 2;
  state.bestError[1] = Math.min(state.bestError[1], avg);

  let msgs = [];
  if(peakErr > tolPeak){
    msgs.push("<span class='bad'>" + (state.selectedPeakNm < state.mission.stage1.truePeakNm ? tr("stage1PeakLow") : tr("stage1PeakHigh")) + "</span>");
  }
  if(tempErr > tolTemp){
    msgs.push("<span class='bad'>" + (Number(q("tempRange").value) < state.mission.stage1.T ? tr("stage1TempLow") : tr("stage1TempHigh")) + "</span>");
  }
  msgs.push("<span class='warnText'>Δpeak = " + fmtNum(peakErr,1) + "% | ΔT = " + fmtNum(tempErr,1) + "%</span>");

  if(peakErr <= tolPeak && tempErr <= tolTemp){
    const firstClear = !state.stageSolved[1];
    state.stageSolved[1] = true;
    q("stageBtn2").disabled = false;
    msgs.unshift("<span class='ok'>" + tr("stage1Solved") + "</span>");
    successTone();
    state.fx.flash = 1;
    state.fx.stagePulse = 1;
    triggerStageAction("success", tr("fxStage1Success"));
    if(firstClear){ registerSuccess(1, avg); showToast("✅ " + tr("roundBadge"), stageName(1)); showRoundClear(1, avg); }
  } else {
    registerFailure();
    failTone();
    triggerStageAction("fail", tr("fxStage1Fail"));
  }
  setFeedback(msgs.join("<br>"));
}

function computeStage2(){
  const tol = state.difficulty === "easy" ? 8 : state.difficulty === "medium" ? 5 : 3;
  const s2 = calcStage2();

  // === CLASSICAL TRAP PHASE ===
  if(!state.classicalTrapDone){
    // Undo the attempt count from computeStage() — trap attempts are free
    state.attempts = Math.max(0, state.attempts - 1);
    if(state.stageAttempts[2]) state.stageAttempts[2] = Math.max(0, state.stageAttempts[2] - 1);

    state.classicalTrapAttempts += 1;
    const intVal = fmtNum0(Number(q("intensityRange").value));
    commitStage2Viz(s2, false);

    if(state.classicalTrapAttempts === 1){
      setFeedback("<span class='bad'>" + tr("trapFail1").replace("{val}", intVal) + "</span>");
      setCrew("crewAtlas","crewMsgFail","bad");
      trapFailTone();
      triggerStageAction("blocked", tr("fxStage2Blocked"));
      updateUI();
      return;
    }
    // After 2+ attempts: even heavier fail, then dramatic unlock
    trapFailTone();
    state.classicalTrapDone = true;
    setFeedback("<span class='bad'>" + tr("trapFail2").replace("{val}", intVal) + "</span><br><br><span class='ok'>" + tr("trapUnlocked") + "</span>");
    setCrew("crewMira","trapUnlocked","good");
    playSequence([196,247,330,440,554],[0.06,0.06,0.08,0.08,0.16],"triangle",0.05);
    state.fx.flash = 1;
    showToast("🔓 λ " + (state.lang==="el"?"ξεκλειδώθηκε":"unlocked"), tr("trapUnlocked").substring(0,60)+"…");
    updateUI();
    return;
  }

  // === NORMAL COMPUTATION (after trap is done) ===

  // === REVEAL computed values NOW (only after Check) ===
  state.stage2ResultsRevealed = true;
  const rp = q("resultsPanel");
  if(rp) rp.classList.remove("hidden");
  if(q("resultsHeader")) q("resultsHeader").textContent = tr("resultsHeader");
  q("derivedKVal").textContent = s2.K > 0 ? fmtNum(s2.K, 2) + " eV" : "0 eV (❌)";
  q("derivedKVal").style.color = s2.K > 0 ? "var(--good)" : "var(--bad)";
  q("derivedIVal").textContent = s2.current > 0 ? fmtNum0(s2.current) + " a.u." : "0 (❌)";
  q("derivedIVal").style.color = s2.current > 0 ? "var(--good)" : "var(--bad)";

  const errK = s2.K > 0 ? Math.abs(s2.K - state.mission.stage2.targetK) / state.mission.stage2.targetK * 100 : 100;
  const errI = s2.current > 0 ? Math.abs(s2.current - state.mission.stage2.targetI) / state.mission.stage2.targetI * 100 : 100;
  const avg = (errK + errI) / 2;
  state.bestError[2] = Math.min(state.bestError[2], avg);
  state.stageSolved[3] = false;
  state.bestError[3] = 100;
  state.stageSolved[4] = false;
  state.bestError[4] = 100;
  q("stageBtn3").disabled = true;
  q("stageBtn4").disabled = true;

  let msgs = [];
  commitStage2Viz(s2, false);

  // === EMISSION STATUS HEADER (always shown first) ===
  if(s2.K <= 0){
    const emHeader = state.lang === "el"
      ? `❌ <strong>Φωτοηλεκτρικό: ΟΧΙ</strong> — E_φωτ = ${fmtNum(s2.E,2)} eV < φ = ${fmtNum(s2.phi,2)} eV`
      : state.lang === "it"
      ? `❌ <strong>Fotoelettrico: NO</strong> — E_fot = ${fmtNum(s2.E,2)} eV < φ = ${fmtNum(s2.phi,2)} eV`
      : `❌ <strong>Photoelectric: NO</strong> — E_phot = ${fmtNum(s2.E,2)} eV < φ = ${fmtNum(s2.phi,2)} eV`;
    msgs.push("<span class='bad'>" + emHeader + "</span>");
    msgs.push("<span class='bad'>" + tr("stage2NoEmission") + "</span>");
  } else {
    const emHeader = state.lang === "el"
      ? `✅ <strong>Φωτοηλεκτρικό: ΝΑΙ</strong> — E_φωτ = ${fmtNum(s2.E,2)} eV > φ = ${fmtNum(s2.phi,2)} eV → Kmax = ${fmtNum(s2.K,2)} eV`
      : state.lang === "it"
      ? `✅ <strong>Fotoelettrico: SÌ</strong> — E_fot = ${fmtNum(s2.E,2)} eV > φ = ${fmtNum(s2.phi,2)} eV → Kmax = ${fmtNum(s2.K,2)} eV`
      : `✅ <strong>Photoelectric: YES</strong> — E_phot = ${fmtNum(s2.E,2)} eV > φ = ${fmtNum(s2.phi,2)} eV → Kmax = ${fmtNum(s2.K,2)} eV`;
    msgs.push("<span class='ok'>" + emHeader + "</span>");

    // Now check if K and I match the TARGETS
    if(errK > tol){
      msgs.push("<span class='bad'>" + (s2.K < state.mission.stage2.targetK ? tr("stage2KLow") : tr("stage2KHigh")) + "</span>");
    }
    if(errI > tol){
      msgs.push("<span class='bad'>" + (s2.current < state.mission.stage2.targetI ? tr("stage2ILow") : tr("stage2IHigh")) + "</span>");
    }
  }
  msgs.push("<span class='warnText'>Ktarget = " + fmtNum(state.mission.stage2.targetK,2) + " eV | Itarget = " + fmtNum0(state.mission.stage2.targetI) + " a.u.</span>");
  msgs.push("<span class='warnText'>ΔK = " + fmtNum(errK,1) + "% | ΔI = " + fmtNum(errI,1) + "%</span>");

  if(s2.K > 0 && errK <= tol && errI <= tol){
    commitStage2Viz(s2, true);
    const firstClear = !state.stageSolved[2];
    state.stageSolved[2] = true;
    q("stageBtn3").disabled = false;
    msgs.unshift("<span class='ok'>" + tr("stage2Solved") + "</span>");
    successTone();
    state.fx.flash = 1;
    state.fx.stagePulse = 1;
    triggerStageAction("success", tr("fxStage2Success"));
    if(firstClear){ registerSuccess(2, avg); showToast("✅ " + tr("roundBadge"), stageName(2)); showRoundClear(2, avg); }
  } else {
    state.stageSolved[2] = false;
    state.fx.stagePulse = 1;
    registerFailure();
    failTone();
    triggerStageAction(s2.K <= 0 ? "blocked" : "fail", s2.K <= 0 ? tr("fxStage2Blocked") : tr("fxStage2Fail"));
  }
  setFeedback(msgs.join("<br>"));
}

function computeStage3(){
  const tol = state.difficulty === "easy" ? 8 : state.difficulty === "medium" ? 5 : 3;
  if(!state.stageSolved[2]){
    registerFailure();
    failTone();
    triggerStageAction("fail", tr("fxStage3Fail"));
    setFeedback("<span class='bad'>" + tr("stage3Need2") + "</span>");
    return;
  }
  const s3 = calcStage3();
  const gate = state.mission.stage3.gateMax;
  const target = state.mission.stage3.targetSpot;
  const errSpot = Math.abs(s3.spotMm - target) / target * 100;
  state.bestError[3] = Math.min(state.bestError[3], errSpot);

  let msgs = [];
  if(s3.reqSlitNm > gate + 1e-9){
    msgs.push("<span class='bad'>" + tr("stage3NeedHigherK") + "</span>");
    msgs.push("<span class='warnText'>arequired = " + fmtNum(s3.reqSlitNm,1) + " nm > gate = " + fmtNum0(gate) + " nm</span>");
    registerFailure();
    failTone();
    triggerStageAction("fail", tr("fxStage3Fail"));
    setFeedback(msgs.join("<br>"));
    return;
  }
  if(s3.slitNm > gate){
    msgs.push("<span class='bad'>" + tr("stage3Gate") + "</span>");
  }
  if(errSpot > tol){
    msgs.push("<span class='bad'>" + (s3.spotMm < target ? tr("stage3SpotLow") : tr("stage3SpotHigh")) + "</span>");
  }
  msgs.push("<span class='warnText'>Δspot = " + fmtNum(errSpot,1) + "% | arequired ≈ " + fmtNum(s3.reqSlitNm,1) + " nm</span>");

  if(s3.slitNm <= gate && errSpot <= tol){
    const firstClear = !state.stageSolved[3];
    state.stageSolved[3] = true;
    msgs.unshift("<span class='ok'>" + tr("stage3Solved") + "</span>");
    successTone();
    state.fx.flash = 1;
    state.fx.stagePulse = 1;
    triggerStageAction("success", tr("fxStage3Success"));
    if(firstClear){ registerSuccess(3, errSpot); showToast("✅ " + tr("roundBadge"), stageName(3)); showRoundClear(3, errSpot); }
  } else {
    state.stageSolved[3] = false;
    if(showStage4()) state.stageSolved[4] = false;
    registerFailure();
    failTone();
    triggerStageAction("fail", tr("fxStage3Fail"));
  }
  setFeedback(msgs.join("<br>"));
}


function computeStage4(){
  const tol = 4;
  if(!state.stageSolved[3]){
    registerFailure();
    failTone();
    triggerStageAction("fail", tr("fxStage4Fail"));
    setFeedback("<span class='bad'>" + tr("stage4Need3") + "</span>");
    return;
  }
  const s4 = calcStage4();
  const targetL = state.mission.stage4.scatteredPm;
  const targetE = state.mission.stage4.recoilKeV;
  const errL = Math.abs(s4.scatteredPm - targetL) / targetL * 100;
  const errE = Math.abs(s4.recoilKeV - targetE) / targetE * 100;
  const avg = (errL + errE) / 2;
  state.bestError[4] = Math.min(state.bestError[4], avg);

  let msgs = [];
  if(errL <= tol && errE <= tol){
    const firstClear = !state.stageSolved[4];
    state.stageSolved[4] = true;
    msgs.unshift("<span class='ok'>" + tr("stage4Solved") + "</span>");
    msgs.push("<span class='warnText'>Δλ′ = " + fmtNum(errL,1) + "% | ΔEₑ = " + fmtNum(errE,1) + "%</span>");
    successTone();
    playSequence([440,554,659,880],[0.06,0.06,0.08,0.18],"square",0.04);
    state.fx.flash = 1;
    triggerStageAction("success", tr("fxStage4Success"));
    if(firstClear){ registerSuccess(4, avg); showToast("✅ " + tr("roundBadge"), stageName(4)); showRoundClear(4, avg); }
    setFeedback(msgs.join("<br>"));
    return;
  }

  const lowL = s4.scatteredPm < targetL;
  const lowE = s4.recoilKeV < targetE;
  if(lowL && lowE) msgs.push("<span class='bad'>" + tr("stage4AngleLow") + "</span>");
  else if(!lowL && !lowE) msgs.push("<span class='bad'>" + tr("stage4AngleHigh") + "</span>");
  else if(lowL && !lowE) msgs.push("<span class='bad'>" + tr("stage4IncidentLow") + "</span>");
  else msgs.push("<span class='bad'>" + tr("stage4IncidentHigh") + "</span>");

  if(s4.thetaDeg < 25 && targetL - s4.scatteredPm > 1){
    msgs.push("<span class='warnText'>" + tr("stage4Classical") + "</span>");
  }
  msgs.push("<span class='warnText'>λ′target = " + fmtNum(targetL,1) + " pm | Eₑ,target = " + fmtNum(targetE,2) + " keV</span>");
  msgs.push("<span class='warnText'>Δλ′ = " + fmtNum(errL,1) + "% | ΔEₑ = " + fmtNum(errE,1) + "%</span>");
  state.stageSolved[4] = false;
  registerFailure();
  failTone();
  triggerStageAction("fail", tr("fxStage4Fail"));
  setFeedback(msgs.join("<br>"));
}

function setFeedback(html){
  state.feedbackHtml = html;
  q("feedbackBox").innerHTML = html;
}

function giveHint(){
  if(!state.started) return;
  // Progressive hints: tier 1→2→3 per stage
  if(!state.hintTier) state.hintTier = {};
  if(!state.hintTier[state.stage]) state.hintTier[state.stage] = 0;
  state.hintTier[state.stage] = Math.min(state.hintTier[state.stage] + 1, 3);
  const tier = state.hintTier[state.stage];
  state.hintsUsed += 1;
  const suffix = tier === 1 ? 'a' : tier === 2 ? 'b' : 'c';
  const tipKey = 'tip' + state.stage + suffix;
  const tierLabels = { 1: '🟢 Gentle nudge', 2: '🟡 Stronger hint', 3: '🔴 Almost the answer' };
  const tierLabelsEL = { 1: '🟢 Γενική υπόδειξη', 2: '🟡 Πιο συγκεκριμένη', 3: '🔴 Σχεδόν η λύση' };
  const tierLabelsIT = { 1: '🟢 Suggerimento leggero', 2: '🟡 Più specifico', 3: '🔴 Quasi la risposta' };
  const labels = state.lang === 'el' ? tierLabelsEL : state.lang === 'it' ? tierLabelsIT : tierLabels;
  const tipText = tr(tipKey);
  const penalty = tier === 1 ? 4 : tier === 2 ? 6 : 8;
  let html = '<div class="hintTier"><div class="tierLabel">' + labels[tier] + ' (-' + penalty + ' pts)</div>' + tipText + '</div>';
  // Show previous tiers too
  for(let t = 1; t < tier; t++){
    const prevKey = 'tip' + state.stage + (t===1?'a':t===2?'b':'c');
    html = '<div class="hintTier" style="opacity:.6"><div class="tierLabel">' + labels[t] + '</div>' + tr(prevKey) + '</div>' + html;
  }
  if(tier < 3) html += '<div class="small" style="margin-top:6px;color:var(--muted)">' + (state.lang === 'el' ? 'Πάτα Hint ξανά για πιο αναλυτικό hint.' : state.lang === 'it' ? 'Premi Hint di nuovo per un hint più dettagliato.' : 'Press Hint again for a more detailed hint.') + '</div>';
  setFeedback(html);
  registerFailure("hint");
  playSequence([660,560,660],[0.04,0.05,0.07],"sine",0.035);
  updateUI();
}

function currentScore(){
  const accuracy = clamp(100 - avgBestError(), 0, 100);
  const attemptPart = clamp(100 - Math.max(0, state.attempts - 3) * 8 - state.hintsUsed * 6, 0, 100);
  return Math.round(0.7 * attemptPart + 0.3 * accuracy);
}

function avgBestError(){
  const vals = activeStages().map(i => state.bestError[i]).filter(v => Number.isFinite(v) && v < 100);
  if(vals.length === 0) return 100;
  return vals.reduce((a,b)=>a+b,0) / vals.length;
}

function medalFor(err){
  if(err < 5) return { symbol:"🥇" };
  if(err < 10) return { symbol:"🥈" };
  if(err < 20) return { symbol:"🥉" };
  return { symbol:"💔" };
}

function finishMission(){
  if(!canLaunch()){
    registerFailure();
    failTone();
    setFeedback("<span class='bad'>" + tr("launchLocked") + "</span>");
    return;
  }

  // === PHASE 1: Canvas celebration (fireworks + pod launch) ===
  state.paused = true;
  state.fx.celebration = { active:true, startTime:state.timeSec, particles:[], phase:0 };

  // Create firework particles
  const canvas = q("simCanvas");
  const cw = canvas ? canvas.width : 800;
  const ch = canvas ? canvas.height : 500;
  for(let burst=0; burst<5; burst++){
    const bx = cw * (0.2 + Math.random()*0.6);
    const by = ch * (0.15 + Math.random()*0.4);
    const hue = Math.random()*360;
    for(let p=0; p<30; p++){
      const angle = (Math.PI*2*p/30) + (Math.random()-0.5)*0.3;
      const speed = 1.5 + Math.random()*3;
      state.fx.celebration.particles.push({
        x:bx, y:by, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
        life:1, decay:0.008 + Math.random()*0.006,
        color:`hsla(${hue+Math.random()*40},90%,65%,`, size:2+Math.random()*3,
        delay: burst * 0.4
      });
    }
  }

  // Victory sound: ascending fanfare
  playVictoryFanfare();

  // Add rocket emoji
  const rocket = document.createElement("div");
  rocket.className = "rocketEmoji";
  rocket.textContent = "🚀";
  document.body.appendChild(rocket);
  setTimeout(()=> rocket.remove(), 3000);

  // Add confetti
  launchConfetti();

  // === PHASE 2: Show end modal after 2.5s delay ===
  setTimeout(()=> showVictoryModal(), 2800);

  setFeedback("<span class='ok'>" + tr("missionDone") + "</span>");
  setCrew("crewAtlas","crewMsgFinal","good");
}

    "• With your stage-2 electrons, the required slit was about " + fmtNum(calcStage3().reqSlitNm,1) + " nm for Δx = " + fmtNum0(state.mission.stage3.targetSpot) + " mm.";
  if(showStage4()){
    theory += "<br>• Boss phase: λ′target = " + fmtNum(state.mission.stage4.scatteredPm,1) + " pm and Eₑ,target = " + fmtNum(state.mission.stage4.recoilKeV,2) + " keV, with Δλ depending on θ.";
  }
  const classicalComparison = state.lang === "el" 
    ? "<br><br><strong>Κλασικά vs Κβαντικά:</strong><br>• Κλασικά: η ένταση θα αύξανε την ενέργεια ηλεκτρονίων → Λάθος!<br>• Κβαντικά: μόνο η συχνότητα αλλάζει την ενέργεια ανά φωτόνιο ✓<br>• Κλασικά: στενότερη σχισμή → πιο εστιασμένη δέσμη → Λάθος!<br>• Κβαντικά: στενότερη σχισμή → μεγαλύτερη αβεβαιότητα → εξάπλωση ✓"
    : state.lang === "it"
    ? "<br><br><strong>Classica vs Quantistica:</strong><br>• Classica: l'intensità aumenterebbe l'energia degli elettroni → Sbagliato!<br>• Quantistica: solo la frequenza cambia l'energia per fotone ✓<br>• Classica: fessura più stretta → fascio più stretto → Sbagliato!<br>• Quantistica: fessura più stretta → più incertezza → diffusione ✓"
    : "<br><br><strong>Classical vs Quantum:</strong><br>• Classical: intensity would increase electron energy → Wrong!<br>• Quantum: only frequency changes energy per photon ✓<br>• Classical: narrower slit → tighter beam → Wrong!<br>• Quantum: narrower slit → more uncertainty → spreading ✓";
  theory += classicalComparison;

function fmtTime(sec){
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return pad2(m) + ":" + pad2(s);
}
